<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тетрис</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E4635;--ink-soft:#4C7767;--blue:#4FB8E8;--blue-dark:#1B7FA8;--card-bg:#FFFFFF;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;padding:0;height:100%;width:100%;font-family:'Nunito',sans-serif;color:var(--ink);
    touch-action:none;overscroll-behavior:none;
    background:linear-gradient(180deg,#BFF3E0 0%,#E9FBEF 55%,#FFF7E0 100%);overflow:hidden;}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;padding:0 10px;}
  .icon-btn{position:fixed;width:40px;height:40px;border-radius:50%;background:#0f1710;
    display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink);
    z-index:20;border:2px solid #35C57A;
    box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 14px rgba(53,197,122,0.55);
    animation:pentagram-glow 2.4s ease-in-out infinite;}
  .icon-btn:active{transform:translateY(3px);}
  .icon-btn svg{width:18px;height:18px;filter:drop-shadow(0 0 3px rgba(53,197,122,0.9));}
  .back-btn{top:12px;left:12px;}
  .pause-btn{top:12px;right:12px;}
  @keyframes pentagram-glow{
    0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 10px rgba(53,197,122,0.45); }
    50%{ box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 20px rgba(53,197,122,0.85); }
  }
  .hud{display:flex;justify-content:center;gap:6px;padding:10px 60px 4px;flex-wrap:wrap;flex:0 0 auto;}
  .pill{background:#E4F6FD;color:var(--blue-dark);font-family:'Baloo 2',sans-serif;font-weight:700;
    padding:3px 10px;border-radius:20px;font-size:12px;}
  .main-row{flex:1;display:flex;gap:10px;align-items:center;justify-content:center;min-height:0;}
  .board-holder{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;height:100%;}
  canvas#board{display:block;box-shadow:0 14px 24px -10px rgba(30,70,53,0.25);}
  .side{display:flex;flex-direction:column;gap:10px;align-items:center;flex:0 0 auto;}
  .next-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:11px;color:var(--ink-soft);}
  canvas#next{background:#fff;border-radius:12px;box-shadow:0 8px 16px -8px rgba(30,70,53,0.25);}
  .controls{display:flex;justify-content:center;gap:8px;padding:12px 0 16px;flex:0 0 auto;}
  .ctrl-btn{background:var(--card-bg);border:none;border-radius:14px;font-size:19px;color:var(--ink);
    width:50px;height:50px;box-shadow:0 6px 0 rgba(0,0,0,0.06),0 8px 14px -6px rgba(30,70,53,0.2);}
  .ctrl-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  .overlay{position:fixed;inset:0;background:rgba(30,70,53,0.55);display:none;align-items:center;justify-content:center;z-index:30;}
  .overlay.show{display:flex;}
  .modal{background:var(--card-bg);border-radius:22px;padding:26px 24px;text-align:center;max-width:280px;
    box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);}
  .modal h2{font-family:'Baloo 2',sans-serif;margin:0 0 8px;font-size:22px;color:var(--blue-dark);}
  .modal p{font-weight:700;color:var(--ink-soft);margin:0 0 16px;}
  .btn-main{background:linear-gradient(135deg,var(--blue),#A9DFF6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:16px;padding:12px 26px;border-radius:16px;box-shadow:0 8px 0 var(--blue-dark);}
  .btn-main:active{transform:translateY(4px);box-shadow:0 4px 0 var(--blue-dark);}
</style>
</head>
<body>
<a class="icon-btn back-btn" href="index.html">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="3" opacity="0.5"/>
    <path d="M60 20 L32 50 L60 80" fill="none" stroke="#35C57A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>
<button class="icon-btn pause-btn" id="pauseBtn">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="3" opacity="0.5"/>
    <rect x="34" y="28" width="12" height="44" fill="#35C57A"/>
    <rect x="56" y="28" width="12" height="44" fill="#35C57A"/>
  </svg>
</button>
<div class="wrap">
  <div class="hud">
    <div class="pill" id="score">Очки: 0</div>
    <div class="pill" id="lines">Линии: 0</div>
    <div class="pill" id="level">Уровень: 1</div>
  </div>
  <div class="main-row">
    <div class="board-holder"><canvas id="board"></canvas></div>
    <div class="side">
      <span class="next-label">Дальше</span>
      <canvas id="next" width="70" height="70"></canvas>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="left">⬅️</button>
    <button class="ctrl-btn" id="rotate">🔄</button>
    <button class="ctrl-btn" id="down">⬇️</button>
    <button class="ctrl-btn" id="right">➡️</button>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Игра окончена 🧱</h2>
    <p id="finalScore">Очки: 0</p>
    <button class="btn-main" id="restart">Сыграть ещё</button>
  </div>
</div>
<script>
if(window.Telegram && window.Telegram.WebApp){
  const tg=window.Telegram.WebApp;
  tg.ready(); tg.expand();
  if(typeof tg.disableVerticalSwipes==='function') tg.disableVerticalSwipes();
}

const cols=10, rows=20;
let cell=22;
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const nextCanvas=document.getElementById('next');
const nctx=nextCanvas.getContext('2d');
const START_SPEED=900, MIN_SPEED=250, LINES_PER_LEVEL=5, SPEED_STEP=45;
let grid, current, nextPiece, score, lines, level, alive, dropCounter, dropInterval, lastTime, flashRows, flashTimer, landFlash, landFlashTimer;

function resizeCanvas(){
  const holder=document.querySelector('.board-holder');
  const availW=holder.clientWidth, availH=holder.clientHeight;
  cell=Math.floor(Math.min(availW/cols, availH/rows));
  const pxW=cell*cols, pxH=cell*rows;
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  canvas.style.width=pxW+'px'; canvas.style.height=pxH+'px';
  canvas.width=pxW*dpr; canvas.height=pxH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  canvas.style.borderRadius='14px';
}
window.addEventListener('resize', resizeCanvas);

const COLORS={ I:'#4FB8E8', J:'#3A6FDE', L:'#FFA940', O:'#FFC94D', S:'#35C57A', T:'#A87BE0', Z:'#F58FB3' };
const SHAPES={
  I:[[1,1,1,1]], J:[[1,0,0],[1,1,1]], L:[[0,0,1],[1,1,1]],
  O:[[1,1],[1,1]], S:[[0,1,1],[1,1,0]], T:[[0,1,0],[1,1,1]], Z:[[1,1,0],[0,1,1]]
};
function emptyGrid(){ return Array.from({length:rows},()=>Array(cols).fill(null)); }
function randPiece(){
  const keys=Object.keys(SHAPES);
  const k=keys[Math.floor(Math.random()*keys.length)];
  return {key:k, shape:SHAPES[k].map(r=>r.slice()), color:COLORS[k]};
}
function newPiece(){
  const p = nextPiece || randPiece();
  nextPiece = randPiece();
  drawNext();
  return {shape:p.shape, color:p.color, x:Math.floor(cols/2)-Math.ceil(p.shape[0].length/2), y:0};
}
function rotate(matrix){
  const N=matrix.length, M=matrix[0].length;
  const res=Array.from({length:M},()=>Array(N).fill(0));
  for(let r=0;r<N;r++) for(let c=0;c<M;c++) res[c][N-1-r]=matrix[r][c];
  return res;
}
function collide(px,py,shape){
  for(let r=0;r<shape.length;r++){
    for(let c=0;c<shape[r].length;c++){
      if(!shape[r][c]) continue;
      const x=px+c, y=py+r;
      if(x<0||x>=cols||y>=rows) return true;
      if(y>=0 && grid[y][x]) return true;
    }
  }
  return false;
}
function ghostY(){
  let gy=current.y;
  while(!collide(current.x,gy+1,current.shape)) gy++;
  return gy;
}
function merge(){
  const {shape,color,x,y}=current;
  shape.forEach((row,r)=>row.forEach((v,c)=>{ if(v && y+r>=0) grid[y+r][x+c]=color; }));
}
function clearLines(){
  let full=[];
  for(let r=0;r<rows;r++) if(grid[r].every(v=>v)) full.push(r);
  if(full.length){
    flashRows=full; flashTimer=8;
    setTimeout(()=>{
      full.sort((a,b)=>a-b).forEach(r=>{ grid.splice(r,1); grid.unshift(Array(cols).fill(null)); });
      const points=[0,100,300,500,800][full.length]||1000;
      score+=points; lines+=full.length;
      level=Math.floor(lines/LINES_PER_LEVEL)+1;
      document.getElementById('score').textContent='Очки: '+score;
      document.getElementById('lines').textContent='Линии: '+lines;
      document.getElementById('level').textContent='Уровень: '+level;
      dropInterval=Math.max(MIN_SPEED, START_SPEED-(level-1)*SPEED_STEP);
    }, 140);
  }
}
function drop(){
  if(paused) return;
  if(!collide(current.x,current.y+1,current.shape)){
    current.y++;
  } else {
    landFlash=[]; current.shape.forEach((row,r)=>row.forEach((v,c)=>{ if(v) landFlash.push({x:current.x+c,y:current.y+r}); }));
    landFlashTimer=6;
    merge();
    clearLines();
    current=newPiece();
    if(collide(current.x,current.y,current.shape)) gameOver();
  }
  dropCounter=0;
}
function move(dx){ if(paused) return; if(!collide(current.x+dx,current.y,current.shape)) current.x+=dx; }
function doRotate(){
  if(paused) return;
  const rotated=rotate(current.shape);
  let kick=0;
  if(collide(current.x,current.y,rotated)) kick = (current.x+rotated[0].length>cols) ? -1 : 1;
  if(!collide(current.x+kick,current.y,rotated)){ current.shape=rotated; current.x+=kick; }
}
function shade(hex, amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt, g=((n>>8)&0xff)+amt, b=(n&0xff)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return `rgb(${r},${g},${b})`;
}
function drawCell(c2,x,y,color,size){
  const grad=c2.createLinearGradient(x*size,y*size,x*size+size,y*size+size);
  grad.addColorStop(0, shade(color,35));
  grad.addColorStop(1, shade(color,-25));
  c2.fillStyle=grad;
  c2.fillRect(x*size+1,y*size+1,size-2,size-2);
  c2.strokeStyle='rgba(255,255,255,0.35)';
  c2.strokeRect(x*size+1.5,y*size+1.5,size-3,size-3);
}
function draw(){
  const pxW=cell*cols, pxH=cell*rows;
  ctx.clearRect(0,0,pxW,pxH);
  ctx.fillStyle='#F5FBFF'; ctx.fillRect(0,0,pxW,pxH);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(grid[r][c]) drawCell(ctx,c,r,grid[r][c],cell);
  if(landFlashTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${landFlashTimer/6*0.5})`;
    landFlash.forEach(p=> ctx.fillRect(p.x*cell,p.y*cell,cell,cell));
    landFlashTimer--;
  }
  if(flashTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${flashTimer/8*0.8})`;
    flashRows.forEach(r=> ctx.fillRect(0,r*cell,pxW,cell));
    flashTimer--;
  }
  const gy=ghostY();
  ctx.globalAlpha=0.25;
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(ctx,current.x+c,gy+r,current.color,cell); }));
  ctx.globalAlpha=1;
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(ctx,current.x+c,current.y+r,current.color,cell); }));
}
function drawNext(){
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  if(!nextPiece) return;
  const size=16;
  const w=nextPiece.shape[0].length*size, h=nextPiece.shape.length*size;
  const ox=(nextCanvas.width-w)/2, oy=(nextCanvas.height-h)/2;
  nctx.save();
  nctx.translate(ox,oy);
  nextPiece.shape.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(nctx,c,r,nextPiece.color,size); }));
  nctx.restore();
}
function gameOver(){
  alive=false;
  document.getElementById('finalScore').textContent='Очки: '+score;
  document.getElementById('overlay').classList.add('show');
}
let paused=false;
function loop(time=0){
  if(!alive) return;
  if(paused){
    draw();
    drawPauseOverlay();
    return;
  }
  const delta=time-lastTime; lastTime=time;
  dropCounter+=delta;
  if(dropCounter>dropInterval) drop();
  draw();
  requestAnimationFrame(loop);
}
function drawPauseOverlay(){
  const pxW=cell*cols, pxH=cell*rows;
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,pxW,pxH);
  ctx.fillStyle='#fff';
  ctx.font='bold '+(cell*1.6)+'px "Baloo 2", sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Пауза', pxW/2, pxH/2);
  ctx.font='bold '+(cell*0.42)+'px "Nunito", sans-serif';
  ctx.fillText('Нажми на паузу ещё раз', pxW/2, pxH/2+cell*0.9);
}
document.getElementById('pauseBtn').onclick=()=>{
  if(!alive) return;
  paused=!paused;
  if(!paused){ lastTime=performance.now(); requestAnimationFrame(loop); }
};
function reset(){
  resizeCanvas();
  grid=emptyGrid(); score=0; lines=0; level=1; alive=true; paused=false;
  dropCounter=0; dropInterval=START_SPEED; lastTime=0; flashTimer=0; flashRows=[]; landFlash=[]; landFlashTimer=0;
  nextPiece=null;
  document.getElementById('score').textContent='Очки: 0';
  document.getElementById('lines').textContent='Линии: 0';
  document.getElementById('level').textContent='Уровень: 1';
  document.getElementById('overlay').classList.remove('show');
  current=newPiece();
  requestAnimationFrame(loop);
}
document.getElementById('left').onclick=()=>move(-1);
document.getElementById('right').onclick=()=>move(1);
document.getElementById('down').onclick=drop;
document.getElementById('rotate').onclick=doRotate;
document.getElementById('restart').onclick=reset;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') move(-1);
  if(e.key==='ArrowRight') move(1);
  if(e.key==='ArrowDown') drop();
  if(e.key==='ArrowUp') doRotate();
});
let touchStartX=0, touchStartY=0, touchMoved=false;
canvas.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchMoved=false;
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-touchStartX;
  if(Math.abs(dx)>28){ move(dx>0?1:-1); touchStartX=e.touches[0].clientX; touchMoved=true; }
},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(!touchMoved){ if(dy>40) drop(); else doRotate(); }
},{passive:true});
window.addEventListener('load', reset);
if(document.readyState==='complete') reset();
</script>
</body>
</html>
