<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E4635;--ink-soft:#4C7767;--green:#35C57A;--green-dark:#1E9E5E;--card-bg:#FFFFFF;--yellow:#FFC94D;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;padding:0;height:100%;width:100%;font-family:'Nunito',sans-serif;color:var(--ink);
    touch-action:none;overscroll-behavior:none;
    background:#DFF7EA;overflow:hidden;}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;}
  .board-holder{flex:1;position:relative;min-height:0;}
  canvas{display:block;width:100%;height:100%;}
  .icon-btn{position:fixed;width:42px;height:42px;border-radius:50%;background:#0f1710;
    display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink);
    z-index:20;border:2px solid #35C57A;
    box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 14px rgba(53,197,122,0.55);
    animation:pentagram-glow 2.4s ease-in-out infinite;}
  .icon-btn:active{transform:translateY(3px);}
  .icon-btn svg{width:20px;height:20px;filter:drop-shadow(0 0 3px rgba(53,197,122,0.9));}
  .back-btn{top:12px;left:12px;}
  .skin-btn{top:66px;right:12px;font-size:22px;}
  .pause-btn{top:12px;right:12px;}
  .records-btn{top:66px;left:12px;}
  @keyframes pentagram-glow{
    0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 10px rgba(53,197,122,0.45); }
    50%{ box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 20px rgba(53,197,122,0.85); }
  }
  .overlay{position:fixed;inset:0;background:rgba(30,70,53,0.55);display:none;align-items:center;justify-content:center;z-index:30;}
  .overlay.show{display:flex;}
  .modal{background:var(--card-bg);border-radius:22px;padding:26px 24px;text-align:center;max-width:310px;width:88%;
    box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);}
  .modal h2{font-family:'Baloo 2',sans-serif;margin:0 0 8px;font-size:22px;color:var(--green-dark);}
  .modal p{font-weight:700;color:var(--ink-soft);margin:0 0 10px;}
  .modal .best{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
  .btn-main{background:linear-gradient(135deg,var(--green),#7BE3A6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:16px;padding:12px 26px;border-radius:16px;box-shadow:0 8px 0 var(--green-dark);}
  .btn-main:active{transform:translateY(4px);box-shadow:0 4px 0 var(--green-dark);}
  .skins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
  .skin-opt{aspect-ratio:1/1;border-radius:14px;background:#F5FFF9;border:2px solid transparent;display:flex;
    flex-direction:column;align-items:center;justify-content:center;font-size:24px;position:relative;gap:2px;}
  .skin-opt .name{font-size:9px;font-weight:700;color:var(--ink-soft);}
  .skin-opt.locked{opacity:0.35;}
  .skin-opt.active{border-color:var(--green-dark);}
  .skin-opt .lock{position:absolute;bottom:2px;right:4px;font-size:9px;color:var(--ink-soft);font-weight:700;}
</style>
</head>
<body>
<a class="icon-btn back-btn" href="index.html">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="3" opacity="0.5"/>
    <path d="M60 20 L32 50 L60 80" fill="none" stroke="#35C57A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>
<button class="icon-btn skin-btn" id="skinBtn">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="4"/>
    <polygon points="50,8 61,38 93,38 67,57 77,88 50,69 23,88 33,57 7,38 39,38"
      fill="none" stroke="#35C57A" stroke-width="4" stroke-linejoin="round"/>
  </svg>
</button>
<button class="icon-btn pause-btn" id="pauseBtn">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="3" opacity="0.5"/>
    <rect x="34" y="28" width="12" height="44" fill="#35C57A"/>
    <rect x="56" y="28" width="12" height="44" fill="#35C57A"/>
  </svg>
</button>
<button class="icon-btn records-btn" id="recordsBtn">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="3" opacity="0.5"/>
    <path d="M50 15 L58 38 L83 38 L62 52 L70 76 L50 62 L30 76 L38 52 L17 38 L42 38 Z"
      fill="#35C57A"/>
  </svg>
</button>
<div class="wrap">
  <div class="board-holder"><canvas id="board"></canvas></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="overTitle">Игра окончена 🪶</h2>
    <p id="finalScore">Счёт: 0</p>
    <p class="best" id="bestScore">Рекорд: 0</p>
    <button class="btn-main" id="restart">Сыграть ещё</button>
  </div>
</div>
<div class="overlay" id="skinOverlay">
  <div class="modal">
    <h2>Скины</h2>
    <p class="best">Открываются каждые 50 очков рекорда</p>
    <div class="skins-grid" id="skinsGrid"></div>
    <button class="btn-main" id="closeSkins">Закрыть</button>
  </div>
</div>
<div class="overlay" id="recordsOverlay">
  <div class="modal">
    <h2>🏆 Мои рекорды</h2>
    <p class="best">Топ-10 твоих лучших попыток (хранится за твоим аккаунтом)</p>
    <div id="recordsList" style="text-align:left;margin:10px 0;max-height:240px;overflow-y:auto;"></div>
    <button class="btn-main" id="closeRecords">Закрыть</button>
  </div>
</div>
<script>
if(window.Telegram && window.Telegram.WebApp){
  const tg=window.Telegram.WebApp;
  tg.ready(); tg.expand();
  if(typeof tg.disableVerticalSwipes==='function') tg.disableVerticalSwipes();
}

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let W=0,H=0;
function resizeCanvas(){
  const holder=document.querySelector('.board-holder');
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  W=holder.clientWidth; H=holder.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeCanvas);

// ---------- Скины: постоянные, открываются каждые 50 очков рекорда ----------
const SKINS=[
  {id:'classic',   emoji:'🐤',  name:'Классика', unlock:0,   body:'#FFC94D', bodyLight:'#FFE29A', beak:'#FF8A3D', sky:['#8FE0D8','#DFF7EA']},
  {id:'crow',      emoji:'🐦‍⬛', name:'Ворон',    unlock:50,  body:'#2b2b36', bodyLight:'#454554', beak:'#8a8a9a', sky:['#4a4a5a','#2a2a35'], extra:'crow'},
  {id:'silver',    emoji:'🕊️',  name:'Серебро',  unlock:100, body:'#C7CDD6', bodyLight:'#EDEFF3', beak:'#8B93A1', sky:['#AEB9C7','#E7ECF2']},
  {id:'sigma',     emoji:'😎',  name:'Сигма',    unlock:150, body:'#3d3d46', bodyLight:'#5c5c68', beak:'#FFD24D', sky:['#232331','#3a3a4a'], extra:'sigma'},
  {id:'gold',      emoji:'🐥',  name:'Золото',   unlock:200, body:'#FFD700', bodyLight:'#FFF3B0', beak:'#E8960C', sky:['#FFDD7A','#FFF3D0']},
  {id:'crylaugh',  emoji:'😂',  name:'Плакса',   unlock:250, body:'#FFE24D', bodyLight:'#FFF3A0', beak:'#FF8A3D', sky:['#FFD36E','#FFF0C2'], extra:'crylaugh'},
  {id:'platinum',  emoji:'🦢',  name:'Платина',  unlock:300, body:'#E5E8F5', bodyLight:'#FFFFFF', beak:'#B7A8E0', sky:['#D6D9F5','#F3F0FF']},
  {id:'gigachad',  emoji:'🗿',  name:'Гигачад',  unlock:350, body:'#D9D2C4', bodyLight:'#F0ECE0', beak:'#8B7D5A', sky:['#B8AC94','#E8E0CC'], extra:'gigachad'},
];
// ---------- Хранение рекорда и скина: Telegram CloudStorage (привязано к аккаунту, не к устройству) ----------
let BEST=0, SELECTED_SKIN='classic', dataLoaded=false;
function cloudAvailable(){ return window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage; }
function loadUserData(cb){
  if(cloudAvailable()){
    const tg=window.Telegram.WebApp;
    tg.CloudStorage.getItem('flappy_best',(err,val)=>{
      BEST = (!err && val) ? (parseInt(val,10)||0) : (parseInt(localStorage.getItem('flappy_best')||'0',10));
      tg.CloudStorage.getItem('flappy_skin',(err2,val2)=>{
        SELECTED_SKIN = (!err2 && val2) ? val2 : (localStorage.getItem('flappy_skin')||'classic');
        localStorage.setItem('flappy_best', String(BEST));
        localStorage.setItem('flappy_skin', SELECTED_SKIN);
        dataLoaded=true; cb();
      });
    });
  } else {
    BEST=parseInt(localStorage.getItem('flappy_best')||'0',10);
    SELECTED_SKIN=localStorage.getItem('flappy_skin')||'classic';
    dataLoaded=true; cb();
  }
}
function getBest(){ return BEST; }
function setBest(v){
  BEST=v; localStorage.setItem('flappy_best', String(v));
  if(cloudAvailable()) window.Telegram.WebApp.CloudStorage.setItem('flappy_best', String(v), ()=>{});
}
function getUnlocked(){ const best=getBest(); return SKINS.filter(s=>best>=s.unlock).map(s=>s.id); }
function getSelectedSkinId(){ return SELECTED_SKIN; }
function setSelectedSkinId(id){
  SELECTED_SKIN=id; localStorage.setItem('flappy_skin', id);
  if(cloudAvailable()) window.Telegram.WebApp.CloudStorage.setItem('flappy_skin', id, ()=>{});
}
function currentSkin(){ return SKINS.find(s=>s.id===getSelectedSkinId()) || SKINS[0]; }

// ---------- Личные рекорды (топ-10 попыток) ----------
let RECORDS=[];
function loadRecords(cb){
  if(cloudAvailable()){
    window.Telegram.WebApp.CloudStorage.getItem('flappy_records',(err,val)=>{
      try{ RECORDS = (!err && val) ? JSON.parse(val) : JSON.parse(localStorage.getItem('flappy_records')||'[]'); }
      catch(e){ RECORDS=[]; }
      cb && cb();
    });
  } else {
    try{ RECORDS=JSON.parse(localStorage.getItem('flappy_records')||'[]'); } catch(e){ RECORDS=[]; }
    cb && cb();
  }
}
function saveRecordEntry(sc){
  if(sc<=0) return;
  const entry={score:sc, date:new Date().toLocaleDateString('ru-RU')};
  RECORDS.push(entry);
  RECORDS.sort((a,b)=>b.score-a.score);
  RECORDS=RECORDS.slice(0,10);
  const json=JSON.stringify(RECORDS);
  localStorage.setItem('flappy_records', json);
  if(cloudAvailable()) window.Telegram.WebApp.CloudStorage.setItem('flappy_records', json, ()=>{});
}
function renderRecords(){
  const list=document.getElementById('recordsList');
  if(!RECORDS.length){ list.innerHTML='<p style="text-align:center;color:var(--ink-soft);font-weight:700;">Пока пусто — сыграй разок!</p>'; return; }
  list.innerHTML = RECORDS.map((r,i)=>
    `<div style="display:flex;justify-content:space-between;padding:6px 4px;border-bottom:1px solid #eee;font-weight:700;">
      <span>${i+1}. ${r.score} очков</span><span style="color:var(--ink-soft);font-size:12px;">${r.date}</span>
    </div>`).join('');
}
document.getElementById('recordsBtn').onclick=()=>{ renderRecords(); document.getElementById('recordsOverlay').classList.add('show'); };
document.getElementById('closeRecords').onclick=()=>{ document.getElementById('recordsOverlay').classList.remove('show'); };

function renderSkinsGrid(){
  const grid=document.getElementById('skinsGrid');
  grid.innerHTML='';
  const unlocked=getUnlocked();
  SKINS.forEach(s=>{
    const isUnlocked=unlocked.includes(s.id);
    const div=document.createElement('div');
    div.className='skin-opt'+(isUnlocked?'':' locked')+(s.id===getSelectedSkinId()?' active':'');
    div.innerHTML = (isUnlocked ? s.emoji : '❔') + `<span class="name">${s.name}</span>` + (isUnlocked?'':`<span class="lock">${s.unlock}</span>`);
    if(isUnlocked) div.onclick=()=>{ setSelectedSkinId(s.id); renderSkinsGrid(); };
    grid.appendChild(div);
  });
}
document.getElementById('skinBtn').onclick=()=>{ renderSkinsGrid(); document.getElementById('skinOverlay').classList.add('show'); };
document.getElementById('closeSkins').onclick=()=>{ document.getElementById('skinOverlay').classList.remove('show'); };

// ---------- Игровые параметры ----------
const BASE_SPEED_R=0.0044, MAX_SPEED_R=0.0092, SPEED_STEP_R=0.0004, SCORE_PER_LEVEL=5;
const GRAVITY_R=0.00052, JUMP_R=-0.0135, MAX_FALL_R=0.0155, MAX_RISE_R=-0.0155;
const DARK_CYCLE=20, DARK_DURATION=5;   // кладбище + ворона
const NYAN_CYCLE=50, NYAN_DURATION=5;   // радуга + Nyan Cat

let bird, pipes, score, alive, frame, level, clouds, particles, speed;
let state='countdown';
let countdownVal=3, countdownTimer=0;
let mode='normal'; // normal | dark | nyan
let prevMode='normal';
let transformParticles=[], spinBoost=0;
let stars=[];

function isDarkScore(s){ if(s<DARK_CYCLE) return false; return (s%DARK_CYCLE)<DARK_DURATION; }
function isNyanScore(s){ if(s<NYAN_CYCLE) return false; return (s%NYAN_CYCLE)<NYAN_DURATION; }

function activeVisual(){
  if(mode==='nyan') return {emoji:'🌈', body:'#F58FB3', bodyLight:'#FFD1E6', beak:'#FF6FA6', nyan:true};
  if(mode==='dark') return {emoji:'🐦‍⬛', body:'#2b2b36', bodyLight:'#454554', beak:'#8a8a9a'};
  return currentSkin();
}
function reset(){
  resizeCanvas();
  bird={x:W*0.22,y:H/2,v:0,r:H*0.023,angle:0,wing:0};
  pipes=[]; particles=[]; transformParticles=[]; spinBoost=0;
  score=0; alive=true; frame=0; level=1; speed=BASE_SPEED_R*W;
  mode='normal'; prevMode='normal';
  clouds=Array.from({length:5},(_,i)=>({x:Math.random()*W,y:H*0.08+i*H*0.11+Math.random()*20,s:0.5+Math.random()*0.7}));
  stars=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H*0.7,r:Math.random()*1.6+0.4,tw:Math.random()*Math.PI*2}));
  document.getElementById('overlay').classList.remove('show');
  state='countdown'; countdownVal=3; countdownTimer=0;
  spawnPipe();
  requestAnimationFrame(loop);
}
function updateLevel(){
  const newLevel=Math.floor(score/SCORE_PER_LEVEL)+1;
  if(newLevel!==level){
    level=newLevel;
    speed=Math.min(MAX_SPEED_R*W, BASE_SPEED_R*W+(level-1)*SPEED_STEP_R*W);
  }
  const nowNyan=isNyanScore(score);
  const nowDark=!nowNyan && isDarkScore(score);
  const newMode = nowNyan ? 'nyan' : (nowDark ? 'dark' : 'normal');
  if(newMode!==mode){
    prevMode=mode; mode=newMode;
    triggerTransformFX();
  }
}
function triggerTransformFX(){
  spinBoost=14;
  const v=activeVisual();
  for(let i=0;i<26;i++){
    const ang=Math.random()*Math.PI*2;
    transformParticles.push({
      x:bird.x, y:bird.y,
      vx:Math.cos(ang)*(1+Math.random()*2.4),
      vy:Math.sin(ang)*(1+Math.random()*2.4),
      life:34, maxLife:34,
      color: i%2===0 ? (v.body||'#FFD700') : '#FFFFFF'
    });
  }
}
function spawnPipe(){
  const gap=H*0.34;
  const top=H*0.09+Math.random()*(H-gap-H*0.30);
  pipes.push({x:W+20, top, passed:false, gap});
}
function pipeW(){ return W*0.135; }
function groundH(){ return H*0.02; }
function loop(){
  if(state==='paused'){
    draw();
    drawPauseOverlay();
    return;
  }
  if(state==='countdown'){
    countdownTimer++;
    if(countdownTimer%40===0){ countdownVal--; }
    if(countdownVal<0){ state='playing'; }
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if(state!=='playing'){ return; }
  frame++;
  const gravity=GRAVITY_R*H, jump=JUMP_R*H, maxFall=MAX_FALL_R*H, maxRise=MAX_RISE_R*H;
  bird.v+=gravity;
  bird.v=Math.max(maxRise, Math.min(maxFall, bird.v));
  bird.y+=bird.v;
  bird.angle += ((bird.v*4)-bird.angle)*0.15;
  bird.wing += 0.3;
  clouds.forEach(c=>{ c.x-=speed*0.22*c.s; if(c.x<-40){c.x=W+40; c.y=H*0.06+Math.random()*(H*0.5);} });
  stars.forEach(s=>{ s.tw+=0.05; });
  if(frame%Math.round(W*0.42)===0) spawnPipe();
  const pw=pipeW();
  pipes.forEach(p=>p.x-=speed);
  pipes = pipes.filter(p=>p.x>-pw-10);
  pipes.forEach(p=>{
    if(!p.passed && p.x+pw<bird.x){
      p.passed=true; score++; updateLevel();
      const v=activeVisual();
      for(let i=0;i<10;i++) particles.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1.5)*3,life:22,color:v.body||'#FFD700'});
    }
    if(bird.x+bird.r>p.x && bird.x-bird.r<p.x+pw){
      if(bird.y-bird.r<p.top || bird.y+bird.r>p.top+p.gap) gameOver();
    }
  });
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  transformParticles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.94;pt.vy*=0.94;pt.life--;});
  transformParticles=transformParticles.filter(pt=>pt.life>0);
  if(spinBoost>0) spinBoost-=0.6;
  if(bird.y+bird.r>H-groundH()-4 || bird.y-bird.r<0) gameOver();
  draw();
  requestAnimationFrame(loop);
}
function drawCloud(c){
  ctx.save();
  ctx.globalAlpha= mode==='dark' ? 0.1 : (mode==='nyan' ? 0.5 : 0.55);
  ctx.fillStyle= mode==='dark' ? '#6a6a7a' : '#ffffff';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, 22*c.s, 12*c.s, 0, 0, Math.PI*2);
  ctx.ellipse(c.x+16*c.s, c.y+3*c.s, 16*c.s, 10*c.s, 0, 0, Math.PI*2);
  ctx.ellipse(c.x-16*c.s, c.y+3*c.s, 14*c.s, 9*c.s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function drawGraveyard(){
  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#000000';
  const n=Math.floor(W/60);
  for(let i=0;i<n;i++){
    const x=i*60+20;
    const h=26+((i*37)%18);
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x,H-groundH()-h,26,h,6); else ctx.rect(x,H-groundH()-h,26,h);
    ctx.fill();
    if(i%2===0){ ctx.fillRect(x+11,H-groundH()-h-14,4,14); ctx.fillRect(x+4,H-groundH()-h-8,18,4); }
  }
  ctx.globalAlpha=0.85;
  ctx.fillStyle='#cfcfe0';
  ctx.beginPath(); ctx.arc(W-W*0.15,H*0.12,W*0.045,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawNyanBg(){
  ctx.save();
  stars.forEach(s=>{
    ctx.globalAlpha=0.5+Math.sin(s.tw)*0.5;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // компактный радужный след — по размеру птички, с лёгкой волной и искрами
  const stripes=['#FF5A5A','#FF9F4D','#FFE24D','#7BE36A','#5AB4FF','#B27BFF'];
  const trailH=bird.r*2.1;
  const stripeH=trailH/stripes.length;
  const trailLen=Math.min(bird.x-14, W*0.32);
  const trailStartX=Math.max(0, bird.x-14-trailLen);
  const waveAmp=bird.r*0.18;

  ctx.save();
  const fade=ctx.createLinearGradient(trailStartX,0,bird.x-14,0);
  fade.addColorStop(0,'rgba(255,255,255,0)');
  fade.addColorStop(1,'rgba(255,255,255,1)');
  stripes.forEach((col,i)=>{
    ctx.fillStyle=col;
    const wave=Math.sin(Date.now()/140 + i)*waveAmp;
    ctx.fillRect(trailStartX, bird.y - trailH/2 + i*stripeH + wave, trailLen+14, stripeH+0.6);
  });
  ctx.globalCompositeOperation='destination-in';
  ctx.fillStyle=fade;
  ctx.fillRect(trailStartX, bird.y-trailH/2-waveAmp, trailLen+14, trailH+waveAmp*2);
  ctx.globalCompositeOperation='source-over';
  ctx.restore();

  // искры вдоль следа
  for(let i=0;i<5;i++){
    const t=(Date.now()/300 + i*0.7) % 1;
    const sx=bird.x-14-trailLen*t;
    const sy=bird.y + Math.sin(Date.now()/160+i*2)*trailH*0.4;
    ctx.globalAlpha=1-t;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,sy,1.6,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}
function drawPipe(p){
  const pw=pipeW();
  let c1,c2,cDark;
  if(mode==='dark'){ c1='#3a3a46'; c2='#55556a'; cDark='#22222c'; }
  else if(mode==='nyan'){ c1='#B27BFF'; c2='#E0BFFF'; cDark='#7B4FBF'; }
  else { c1='#2FAE6C'; c2='#4DDB94'; cDark='#268A56'; }
  const grad=ctx.createLinearGradient(p.x,0,p.x+pw,0);
  grad.addColorStop(0,c1); grad.addColorStop(0.5,c2); grad.addColorStop(1,c1);
  ctx.fillStyle=grad;
  ctx.fillRect(p.x,0,pw,p.top);
  ctx.fillRect(p.x,p.top+p.gap,pw,H-(p.top+p.gap));
  ctx.fillStyle=cDark;
  ctx.fillRect(p.x-4,p.top-18,pw+8,18);
  ctx.fillRect(p.x-4,p.top+p.gap,pw+8,18);
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(p.x+6,0,8,p.top);
  ctx.fillRect(p.x+6,p.top+p.gap+18,8,H-(p.top+p.gap+18));
}
function drawBird(){
  const v=activeVisual();
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate((bird.angle+spinBoost*8)*Math.PI/180);
  if(v.nyan){
    // Nyan Cat — прямоугольное тело-кирпичик с розовой глазурью
    const s=bird.r;
    ctx.fillStyle='#D9A066';
    ctx.fillRect(-s*1.4,-s*0.7,s*2.6,s*1.4);
    ctx.fillStyle='#FFB3D1';
    ctx.fillRect(-s*1.4,-s*0.7,s*2.6,s*0.5);
    // ушки
    ctx.fillStyle='#7C5A3A';
    ctx.beginPath(); ctx.moveTo(-s*1.1,-s*0.7); ctx.lineTo(-s*0.8,-s*1.4); ctx.lineTo(-s*0.5,-s*0.7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.7); ctx.lineTo(s*0.8,-s*1.4); ctx.lineTo(s*1.1,-s*0.7); ctx.fill();
    // мордочка
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s*1.1,-s*0.05,3.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1E4635';
    ctx.beginPath(); ctx.arc(s*1.3,-s*0.05,1.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF9EC4';
    ctx.beginPath(); ctx.arc(0,s*0.05,2.2,0,Math.PI*2); ctx.fill();
  } else {
    const grad=ctx.createRadialGradient(-4,-4,2,0,0,bird.r+2);
    grad.addColorStop(0,v.bodyLight||'#FFE29A'); grad.addColorStop(1,v.body||'#FFC94D');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.ellipse(0,0,bird.r+2,bird.r,0,0,Math.PI*2); ctx.fill();
    const wingY=Math.sin(bird.wing)*bird.r*0.4;
    ctx.fillStyle=v.beak||'#FF8A3D';
    ctx.beginPath(); ctx.ellipse(-bird.r*0.3,wingY,bird.r*0.6,bird.r*0.4,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-bird.r-1,-2); ctx.lineTo(-bird.r-bird.r*0.6,-6); ctx.lineTo(-bird.r-bird.r*0.6,4); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bird.r-3,-2); ctx.lineTo(bird.r+bird.r*0.6,1); ctx.lineTo(bird.r-3,5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(bird.r*0.35,-bird.r*0.35,bird.r*0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=mode==='dark'?'#e04040':'#1E4635';
    ctx.beginPath(); ctx.arc(bird.r*0.45,-bird.r*0.35,bird.r*0.14,0,Math.PI*2); ctx.fill();

    // ---- мемные детали для постоянных скинов ----
    if(v.extra==='crow'){
      ctx.save(); ctx.globalAlpha=0.35;
      ctx.strokeStyle='#8B5CF6'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0,0,bird.r+7,bird.r+5,0,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      ctx.fillStyle='#B24040';
      ctx.beginPath(); ctx.arc(bird.r*0.45,-bird.r*0.35,bird.r*0.14,0,Math.PI*2); ctx.fill();
    }
    if(v.extra==='sigma'){
      ctx.fillStyle='#151515';
      ctx.fillRect(-bird.r*0.15, -bird.r*0.55, bird.r*0.95, bird.r*0.32);
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.fillRect(-bird.r*0.1, -bird.r*0.5, bird.r*0.3, bird.r*0.1);
      ctx.strokeStyle='#D4AF37'; ctx.lineWidth=1.6;
      ctx.beginPath();
      for(let i=0;i<4;i++){ ctx.moveTo(-bird.r*0.4+i*3, bird.r*0.55); ctx.lineTo(-bird.r*0.4+i*3+2, bird.r*0.62); }
      ctx.stroke();
    }
    if(v.extra==='crylaugh'){
      ctx.fillStyle='#4FB8E8';
      ctx.beginPath();
      ctx.moveTo(bird.r*0.35, bird.r*0.05);
      ctx.quadraticCurveTo(bird.r*0.5, bird.r*0.3, bird.r*0.35, bird.r*0.45);
      ctx.quadraticCurveTo(bird.r*0.2, bird.r*0.3, bird.r*0.35, bird.r*0.05);
      ctx.fill();
      ctx.strokeStyle='#B5680C'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(bird.r*0.05, bird.r*0.35, bird.r*0.32, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    }
    if(v.extra==='gigachad'){
      ctx.fillStyle=v.bodyLight;
      ctx.beginPath();
      ctx.moveTo(-bird.r*0.5, bird.r*0.5);
      ctx.lineTo(bird.r*0.6, bird.r*0.55);
      ctx.lineTo(bird.r*0.15, bird.r*0.95);
      ctx.lineTo(-bird.r*0.2, bird.r*0.75);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(bird.r*0.15, bird.r*0.6); ctx.lineTo(bird.r*0.1, bird.r*0.9); ctx.stroke();
    }
  }
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const skinBg = currentSkin().sky;
  const sky=ctx.createLinearGradient(0,0,0,H);
  if(mode==='dark'){ sky.addColorStop(0,'#15121e'); sky.addColorStop(1,'#26202f'); }
  else if(mode==='nyan'){ sky.addColorStop(0,'#1b1440'); sky.addColorStop(1,'#3a2a6b'); }
  else { sky.addColorStop(0,skinBg[0]); sky.addColorStop(1,skinBg[1]); }
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  if(mode==='nyan') drawNyanBg();
  clouds.forEach(drawCloud);
  if(mode==='dark') drawGraveyard();
  pipes.forEach(drawPipe);
  particles.forEach(pt=>{
    ctx.globalAlpha=Math.max(0,pt.life/22);
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  transformParticles.forEach(pt=>{
    ctx.globalAlpha=Math.max(0,pt.life/pt.maxLife);
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,3.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  ctx.fillStyle=mode==='dark'?'#1a1a22':'#B98E4E';
  ctx.fillRect(0,H-groundH(),W,groundH());
  ctx.fillStyle=mode==='dark'?'#0f0f14':'#8FE070';
  ctx.fillRect(0,H-groundH()-3,W,3);
  drawBird();
  ctx.fillStyle=mode==='dark'||mode==='nyan'?'#f5f0ff':'#1E4635';
  ctx.strokeStyle=mode==='dark'||mode==='nyan'?'#000':'#ffffff'; ctx.lineWidth=3;
  ctx.font='bold '+(H*0.06)+'px "Baloo 2", sans-serif'; ctx.textAlign='center';
  ctx.strokeText(score, W/2, H*0.1); ctx.fillText(score, W/2, H*0.1);
  ctx.font='bold '+(H*0.028)+'px "Nunito", sans-serif';
  ctx.fillText('Уровень '+level, W/2, H*0.14);
  if(state==='countdown'){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold '+(H*0.14)+'px "Baloo 2", sans-serif';
    ctx.textAlign='center';
    ctx.fillText(countdownVal>=0?countdownVal:'Лети!', W/2, H/2+20);
  }
}
function gameOver(){
  alive=false; state='over';
  const best=getBest();
  const wasNewBest = score>best;
  if(wasNewBest) setBest(score);
  saveRecordEntry(score);
  document.getElementById('overTitle').textContent = wasNewBest ? 'Новый рекорд! 🏆' : 'Игра окончена 🪶';
  document.getElementById('finalScore').textContent='Счёт: '+score;
  document.getElementById('bestScore').textContent='Рекорд: '+getBest();
  document.getElementById('overlay').classList.add('show');
}
function flap(){ if(state==='playing'){ bird.v=JUMP_R*H; } }
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
canvas.addEventListener('mousedown',flap);
document.addEventListener('keydown',e=>{ if(e.code==='Space') flap(); });
document.getElementById('restart').onclick=reset;

// ---------- Пауза ----------
let pausedFrom=null;
document.getElementById('pauseBtn').onclick=()=>{
  if(state==='playing'){
    pausedFrom='playing'; state='paused';
  } else if(state==='paused'){
    state='countdown'; countdownVal=3; countdownTimer=0;
    requestAnimationFrame(loop);
  }
};
function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';
  ctx.font='bold '+(H*0.07)+'px "Baloo 2", sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Пауза', W/2, H/2);
  ctx.font='bold '+(H*0.024)+'px "Nunito", sans-serif';
  ctx.fillText('Нажми на паузу ещё раз, чтобы продолжить', W/2, H/2+H*0.05);
}

function boot(){ loadUserData(()=>{ loadRecords(()=>{ reset(); }); }); }
window.addEventListener('load', boot);
if(document.readyState==='complete') boot();
</script>
