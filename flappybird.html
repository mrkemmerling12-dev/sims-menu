<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E4635;--ink-soft:#4C7767;--green:#35C57A;--green-dark:#1E9E5E;--card-bg:#FFFFFF;--yellow:#FFC94D;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;padding:0;height:100%;font-family:'Nunito',sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#BFF3E0 0%,#E9FBEF 55%,#FFF7E0 100%);overflow:hidden;transition:background 0.6s;}
  body.dark{background:linear-gradient(180deg,#1a1a26 0%,#100e18 100%);}
  .wrap{max-width:480px;margin:0 auto;padding:14px 14px 10px;display:flex;flex-direction:column;height:100vh;}
  .back-btn{position:fixed;top:14px;left:14px;width:40px;height:40px;border-radius:50%;background:var(--card-bg);
    display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;color:var(--ink);
    box-shadow:0 6px 0 rgba(0,0,0,0.06),0 8px 14px -6px rgba(30,70,53,0.25);z-index:20;}
  .back-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  .skin-btn{position:fixed;top:14px;right:14px;width:40px;height:40px;border-radius:50%;background:var(--card-bg);
    display:flex;align-items:center;justify-content:center;font-size:18px;border:none;
    box-shadow:0 6px 0 rgba(0,0,0,0.06),0 8px 14px -6px rgba(30,70,53,0.25);z-index:20;}
  .skin-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:20px;text-align:center;margin:2px 0 8px;color:var(--ink);transition:color 0.6s;}
  body.dark h1{color:#e6e6f0;}
  .board-holder{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
  canvas{border-radius:18px;box-shadow:0 14px 24px -10px rgba(30,70,53,0.25);max-width:100%;max-height:100%;}
  .hint{text-align:center;font-weight:700;color:var(--ink-soft);font-size:13px;margin-top:10px;}
  .overlay{position:fixed;inset:0;background:rgba(30,70,53,0.55);display:none;align-items:center;justify-content:center;z-index:10;}
  .overlay.show{display:flex;}
  .modal{background:var(--card-bg);border-radius:22px;padding:26px 24px;text-align:center;max-width:300px;
    box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);}
  .modal h2{font-family:'Baloo 2',sans-serif;margin:0 0 8px;font-size:22px;color:var(--green-dark);}
  .modal p{font-weight:700;color:var(--ink-soft);margin:0 0 10px;}
  .modal .best{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
  .btn-main{background:linear-gradient(135deg,var(--green),#7BE3A6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:16px;padding:12px 26px;border-radius:16px;box-shadow:0 8px 0 var(--green-dark);}
  .btn-main:active{transform:translateY(4px);box-shadow:0 4px 0 var(--green-dark);}
  .skins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}
  .skin-opt{aspect-ratio:1/1;border-radius:14px;background:#F5FFF9;border:2px solid transparent;display:flex;
    align-items:center;justify-content:center;font-size:26px;position:relative;}
  .skin-opt.locked{opacity:0.35;}
  .skin-opt.active{border-color:var(--green-dark);}
  .skin-opt .lock{position:absolute;bottom:2px;right:2px;font-size:10px;}
</style>
</head>
<body>
<a class="back-btn" href="index.html">⬅️</a>
<button class="skin-btn" id="skinBtn">🎨</button>
<div class="wrap">
  <h1 id="title">🐤 Flappy Bird</h1>
  <div class="board-holder"><canvas id="board" width="300" height="440"></canvas></div>
  <p class="hint" id="hint">Тапни по экрану, чтобы взлететь</p>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="overTitle">Игра окончена 🪶</h2>
    <p id="finalScore">Счёт: 0</p>
    <p class="best" id="bestScore">Рекорд: 0</p>
    <button class="btn-main" id="restart">Сыграть ещё</button>
  </div>
</div>
<div class="overlay" id="skinOverlay">
  <div class="modal">
    <h2>Скины</h2>
    <p class="best">Открываются по мере роста рекорда</p>
    <div class="skins-grid" id="skinsGrid"></div>
    <button class="btn-main" id="closeSkins">Закрыть</button>
  </div>
</div>
<script>
if(window.Telegram && window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const W=canvas.width, H=canvas.height;

// ---------- Скины (открываются по личному рекорду) ----------
const SKINS=[
  {id:'classic', emoji:'🐤', name:'Классика', unlock:0,  body:'#FFC94D', bodyLight:'#FFE29A', beak:'#FF8A3D'},
  {id:'blue',    emoji:'🐦', name:'Небесный', unlock:10, body:'#4FB8E8', bodyLight:'#A9DFF6', beak:'#F2A93B'},
  {id:'pink',    emoji:'🦩', name:'Фламинго', unlock:20, body:'#F58FB3', bodyLight:'#FBC3D6', beak:'#E85E8A'},
  {id:'gold',    emoji:'🐥', name:'Золотой',  unlock:35, body:'#FFD700', bodyLight:'#FFF3B0', beak:'#E8960C'},
  {id:'purple',  emoji:'🦜', name:'Тропик',   unlock:50, body:'#A87BE0', bodyLight:'#D6BFF5', beak:'#FF8A3D'},
  {id:'crow',    emoji:'🐦‍⬛', name:'Полуночник', unlock:75, body:'#3A3A46', bodyLight:'#5C5C6B', beak:'#E8960C'},
];
function getBest(){ return parseInt(localStorage.getItem('flappy_best')||'0',10); }
function setBest(v){ localStorage.setItem('flappy_best', String(v)); }
function getUnlocked(){
  const best=getBest();
  return SKINS.filter(s=>best>=s.unlock).map(s=>s.id);
}
function getSelectedSkinId(){ return localStorage.getItem('flappy_skin')||'classic'; }
function setSelectedSkinId(id){ localStorage.setItem('flappy_skin', id); }
function currentSkin(){ return SKINS.find(s=>s.id===getSelectedSkinId()) || SKINS[0]; }

function renderSkinsGrid(){
  const grid=document.getElementById('skinsGrid');
  grid.innerHTML='';
  const unlocked=getUnlocked();
  SKINS.forEach(s=>{
    const isUnlocked=unlocked.includes(s.id);
    const div=document.createElement('div');
    div.className='skin-opt'+(isUnlocked?'':' locked')+(s.id===getSelectedSkinId()?' active':'');
    div.innerHTML = isUnlocked ? s.emoji : '❔'+`<span class="lock">${s.unlock}</span>`;
    if(isUnlocked){
      div.onclick=()=>{ setSelectedSkinId(s.id); renderSkinsGrid(); };
    }
    grid.appendChild(div);
  });
}
document.getElementById('skinBtn').onclick=()=>{ renderSkinsGrid(); document.getElementById('skinOverlay').classList.add('show'); };
document.getElementById('closeSkins').onclick=()=>{ document.getElementById('skinOverlay').classList.remove('show'); };

// ---------- Игровые параметры (плавный, медленный старт) ----------
const BASE_SPEED=1.3, MAX_SPEED=2.7, SPEED_STEP=0.12, SCORE_PER_LEVEL=5;
const GRAVITY=0.22, JUMP=-5.2, MAX_FALL=6.5, MAX_RISE=-6.5;
const DARK_CYCLE=20, DARK_DURATION=5; // после каждых 20 очков — 5 очков тёмной темы с вороной

let bird, pipes, score, alive, frame, level, clouds, particles, speed;
let state='countdown'; // countdown | playing | over
let countdownVal=3, countdownTimer=0;
let isDark=false;

function isDarkScore(s){
  if(s<DARK_CYCLE) return false;
  const pos=s%DARK_CYCLE;
  return pos<DARK_DURATION;
}
function activeSkin(){
  if(isDark) return {emoji:'🐦‍⬛', body:'#2b2b36', bodyLight:'#454554', beak:'#8a8a9a'};
  return currentSkin();
}
function reset(){
  bird={x:70,y:H/2,v:0,r:15,angle:0,wing:0};
  pipes=[]; particles=[];
  score=0; alive=true; frame=0; level=1; speed=BASE_SPEED;
  isDark=false;
  document.body.classList.remove('dark');
  clouds=Array.from({length:4},(_,i)=>({x:Math.random()*W,y:30+i*70+Math.random()*30,s:0.5+Math.random()*0.6}));
  document.getElementById('overlay').classList.remove('show');
  state='countdown'; countdownVal=3; countdownTimer=0;
  spawnPipe();
  requestAnimationFrame(loop);
}
function updateLevel(){
  const newLevel=Math.floor(score/SCORE_PER_LEVEL)+1;
  if(newLevel!==level){
    level=newLevel;
    speed=Math.min(MAX_SPEED, BASE_SPEED+(level-1)*SPEED_STEP);
  }
  const nowDark=isDarkScore(score);
  if(nowDark!==isDark){
    isDark=nowDark;
    document.body.classList.toggle('dark', isDark);
  }
}
function spawnPipe(){
  const top=40+Math.random()*(H-180-160);
  pipes.push({x:W+20, top, passed:false});
}
function loop(){
  if(state==='countdown'){
    countdownTimer++;
    if(countdownTimer%40===0){ countdownVal--; }
    if(countdownVal<0){ state='playing'; }
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if(state!=='playing') return;
  frame++;
  bird.v+=GRAVITY;
  bird.v=Math.max(MAX_RISE, Math.min(MAX_FALL, bird.v));
  bird.y+=bird.v;
  bird.angle += ((bird.v*4)-bird.angle)*0.15; // плавный поворот
  bird.wing += 0.3;
  clouds.forEach(c=>{ c.x-=speed*0.22*c.s; if(c.x<-40){c.x=W+40; c.y=20+Math.random()*(H-100);} });
  if(frame%130===0) spawnPipe();
  pipes.forEach(p=>p.x-=speed);
  pipes = pipes.filter(p=>p.x>-58);
  pipes.forEach(p=>{
    if(!p.passed && p.x+58<bird.x){
      p.passed=true; score++; updateLevel();
      const c=activeSkin();
      for(let i=0;i<10;i++) particles.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1.5)*3,life:22,color:c.body});
    }
    if(bird.x+bird.r>p.x && bird.x-bird.r<p.x+58){
      if(bird.y-bird.r<p.top || bird.y+bird.r>p.top+180) gameOver();
    }
  });
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  if(bird.y+bird.r>H-6 || bird.y-bird.r<0) gameOver();
  draw();
  requestAnimationFrame(loop);
}
function drawCloud(c){
  ctx.save();
  ctx.globalAlpha=isDark?0.12:0.55;
  ctx.fillStyle=isDark?'#6a6a7a':'#ffffff';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, 22*c.s, 12*c.s, 0, 0, Math.PI*2);
  ctx.ellipse(c.x+16*c.s, c.y+3*c.s, 16*c.s, 10*c.s, 0, 0, Math.PI*2);
  ctx.ellipse(c.x-16*c.s, c.y+3*c.s, 14*c.s, 9*c.s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function drawGraveyard(){
  // силуэты крестов/надгробий на фоне тёмной темы
  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#000000';
  const positions=[30,90,150,210,270];
  positions.forEach((x,i)=>{
    const h=26+((i*37)%18);
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x,H-8-h,26,h,6) : ctx.rect(x,H-8-h,26,h);
    ctx.fill();
    if(i%2===0){
      ctx.fillRect(x+11,H-8-h-14,4,14);
      ctx.fillRect(x+4,H-8-h-8,18,4);
    }
  });
  // луна
  ctx.globalAlpha=0.8;
  ctx.fillStyle='#cfcfe0';
  ctx.beginPath(); ctx.arc(W-50,50,20,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawPipe(p){
  const c1 = isDark ? '#3a3a46' : '#2FAE6C';
  const c2 = isDark ? '#55556a' : '#4DDB94';
  const cDark = isDark ? '#22222c' : '#268A56';
  const grad=ctx.createLinearGradient(p.x,0,p.x+58,0);
  grad.addColorStop(0,c1); grad.addColorStop(0.5,c2); grad.addColorStop(1,c1);
  ctx.fillStyle=grad;
  ctx.fillRect(p.x,0,58,p.top);
  ctx.fillRect(p.x,p.top+180,58,H-(p.top+180));
  ctx.fillStyle=cDark;
  ctx.fillRect(p.x-4,p.top-18,58+8,18);
  ctx.fillRect(p.x-4,p.top+180,58+8,18);
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(p.x+6,0,8,p.top);
  ctx.fillRect(p.x+6,p.top+180+18,8,H-(p.top+180+18));
}
function drawBird(){
  const skin=activeSkin();
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.angle*Math.PI/180);
  const grad=ctx.createRadialGradient(-4,-4,2,0,0,bird.r+2);
  grad.addColorStop(0,skin.bodyLight); grad.addColorStop(1,skin.body);
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.ellipse(0,0,bird.r+2,bird.r,0,0,Math.PI*2); ctx.fill();
  const wingY=Math.sin(bird.wing)*6;
  ctx.fillStyle=skin.beak;
  ctx.beginPath();
  ctx.ellipse(-4,wingY,9,6,-0.3,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-bird.r-1,-2); ctx.lineTo(-bird.r-9,-6); ctx.lineTo(-bird.r-9,4); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bird.r-3,-2); ctx.lineTo(bird.r+9,1); ctx.lineTo(bird.r-3,5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(5,-5,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isDark?'#e04040':'#1E4635';
  ctx.beginPath(); ctx.arc(6.5,-5,2.2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const sky=ctx.createLinearGradient(0,0,0,H);
  if(isDark){ sky.addColorStop(0,'#15121e'); sky.addColorStop(1,'#26202f'); }
  else { sky.addColorStop(0,'#8FE0D8'); sky.addColorStop(1,'#DFF7EA'); }
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  clouds.forEach(drawCloud);
  if(isDark) drawGraveyard();
  pipes.forEach(drawPipe);
  particles.forEach(pt=>{
    ctx.globalAlpha=Math.max(0,pt.life/22);
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  ctx.fillStyle=isDark?'#1a1a22':'#B98E4E';
  ctx.fillRect(0,H-8,W,8);
  ctx.fillStyle=isDark?'#0f0f14':'#8FE070';
  ctx.fillRect(0,H-11,W,4);
  drawBird();
  ctx.fillStyle=isDark?'#e6e6f0':'#1E4635';
  ctx.strokeStyle=isDark?'#000':'#ffffff'; ctx.lineWidth=3;
  ctx.font='bold 28px "Baloo 2", sans-serif'; ctx.textAlign='center';
  ctx.strokeText(score, W/2, 46); ctx.fillText(score, W/2, 46);
  ctx.font='bold 13px "Nunito", sans-serif';
  ctx.fillText('Уровень '+level, W/2, 66);
  if(state==='countdown'){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold 64px "Baloo 2", sans-serif';
    ctx.textAlign='center';
    ctx.fillText(countdownVal>=0?countdownVal:'Лети!', W/2, H/2+20);
  }
}
function gameOver(){
  alive=false; state='over';
  const best=getBest();
  if(score>best) setBest(score);
  document.getElementById('finalScore').textContent='Счёт: '+score;
  document.getElementById('bestScore').textContent='Рекорд: '+getBest();
  document.getElementById('overlay').classList.add('show');
}
function flap(){ if(state==='playing'){ bird.v=JUMP; } }
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
canvas.addEventListener('mousedown',flap);
document.addEventListener('keydown',e=>{ if(e.code==='Space') flap(); });
document.getElementById('restart').onclick=reset;
reset();
</script>
</body>
</html>
