<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ретро-Бегун</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E4635;--ink-soft:#4C7767;--green:#35C57A;--green-dark:#1E9E5E;--card-bg:#FFFFFF;--yellow:#FFC94D;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;padding:0;height:100%;width:100%;font-family:'Nunito',sans-serif;color:var(--ink);
    background:#8FE0D8;overflow:hidden;}
  .wrap{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}
  .back-btn{position:fixed;top:66px;left:12px;width:42px;height:42px;border-radius:50%;background:#0f1710;
    display:flex;align-items:center;justify-content:center;z-index:20;border:2px solid #35C57A;
    box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 14px rgba(53,197,122,0.55);
    animation:pentagram-glow 2.4s ease-in-out infinite;text-decoration:none;}
  .back-btn:active{transform:translateY(3px);}
  .back-btn svg{width:20px;height:20px;filter:drop-shadow(0 0 3px rgba(53,197,122,0.9));}
  .skin-btn{position:fixed;top:66px;right:12px;width:42px;height:42px;border-radius:50%;background:#0f1710;
    display:flex;align-items:center;justify-content:center;border:2px solid #35C57A;z-index:20;
    box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 14px rgba(53,197,122,0.55);
    animation:pentagram-glow 2.4s ease-in-out infinite;}
  @keyframes pentagram-glow{
    0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 10px rgba(53,197,122,0.45); }
    50%{ box-shadow:0 6px 0 rgba(0,0,0,0.25),0 8px 14px -6px rgba(0,0,0,0.4), 0 0 20px rgba(53,197,122,0.85); }
  }
  .skin-btn svg{width:22px;height:22px;filter:drop-shadow(0 0 3px rgba(53,197,122,0.9));}
  .skin-btn:active{transform:translateY(3px);}
  .ctrl-toggle{position:fixed;bottom:14px;right:14px;width:42px;height:42px;border-radius:50%;background:var(--card-bg);
    border:none;font-size:18px;color:var(--ink);box-shadow:0 6px 0 rgba(0,0,0,0.08),0 8px 14px -6px rgba(30,70,53,0.3);z-index:22;}
  .ctrl-toggle:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.08);}
  .btn-pad{position:fixed;bottom:16px;left:0;right:0;display:none;justify-content:space-between;align-items:flex-end;
    padding:0 14px 0 14px;z-index:21;pointer-events:none;}
  .btn-pad.show{display:flex;}
  .pad-side{display:flex;gap:12px;pointer-events:auto;}
  .pad-btn{width:58px;height:58px;border-radius:20px;background:rgba(255,255,255,0.92);border:none;font-size:22px;
    color:var(--ink);box-shadow:0 6px 0 rgba(0,0,0,0.1),0 8px 14px -6px rgba(30,70,53,0.3);}
  .pad-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.1);}
  #jumpPadBtn{width:68px;height:68px;border-radius:50%;font-size:24px;background:rgba(255,201,77,0.95);pointer-events:auto;}
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(30,70,53,0.9);
    color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;padding:9px 18px;border-radius:16px;
    z-index:25;opacity:0;transition:opacity 0.25s, transform 0.25s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .overlay{position:fixed;inset:0;background:rgba(30,70,53,0.55);display:none;align-items:center;justify-content:center;z-index:30;}
  .overlay.show{display:flex;}
  .modal{background:var(--card-bg);border-radius:22px;padding:26px 24px;text-align:center;max-width:310px;width:88%;
    box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);}
  .modal h2{font-family:'Baloo 2',sans-serif;margin:0 0 8px;font-size:22px;color:var(--green-dark);}
  .modal p{font-weight:700;color:var(--ink-soft);margin:0 0 10px;}
  .btn-main{background:linear-gradient(135deg,var(--green),#7BE3A6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:16px;padding:12px 26px;border-radius:16px;box-shadow:0 8px 0 var(--green-dark);margin-top:6px;}
  .btn-main:active{transform:translateY(4px);box-shadow:0 4px 0 var(--green-dark);}
  .skins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
  .skin-opt{aspect-ratio:1/1;border-radius:14px;background:#F5FFF9;border:2px solid transparent;display:flex;
    flex-direction:column;align-items:center;justify-content:center;font-size:22px;position:relative;gap:2px;}
  .skin-opt .name{font-size:9px;font-weight:700;color:var(--ink-soft);}
  .skin-opt.locked{opacity:0.35;}
  .skin-opt.active{border-color:var(--green-dark);}
  .skin-opt .lock{position:absolute;bottom:2px;right:4px;font-size:9px;color:var(--ink-soft);font-weight:700;}
  .start-overlay{position:fixed;inset:0;background:rgba(20,40,32,0.75);display:flex;align-items:center;justify-content:center;z-index:40;}
  .start-card{background:#fff;border-radius:22px;padding:28px 26px;text-align:center;max-width:300px;}
  .start-card h2{font-family:'Baloo 2',sans-serif;margin:0 0 10px;color:var(--green-dark);}
  .start-card p{font-weight:700;color:var(--ink-soft);font-size:13px;margin:0 0 16px;}
</style>
</head>
<body>
<a class="back-btn" href="index.html">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="3" opacity="0.5"/>
    <path d="M60 20 L32 50 L60 80" fill="none" stroke="#35C57A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>
<button class="skin-btn" id="skinBtn">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#35C57A" stroke-width="4"/>
    <polygon points="50,8 61,38 93,38 67,57 77,88 50,69 23,88 33,57 7,38 39,38"
      fill="none" stroke="#35C57A" stroke-width="4" stroke-linejoin="round"/>
  </svg>
</button>
<div class="wrap"><canvas id="board"></canvas></div>
<div class="toast" id="toast"></div>
<button class="ctrl-toggle" id="ctrlToggle">🎮</button>
<div class="btn-pad" id="btnPad">
  <div class="pad-side">
    <button class="pad-btn" id="leftBtn">◀️</button>
    <button class="pad-btn" id="rightBtn">▶️</button>
  </div>
  <button class="pad-btn" id="jumpPadBtn">⬆️</button>
</div>

<div class="start-overlay" id="startOverlay">
  <div class="start-card">
    <h2>Готов бежать? 🏃</h2>
    <p>Держи палец на экране и веди в сторону — герой побежит туда.<br>Короткий тап — прыжок, ещё один тап в воздухе — прыжок выше!</p>
    <button class="btn-main" id="startBtn">Поехали!</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="overTitle">Игра окончена</h2>
    <p id="overText">Монеты: 0</p>
    <button class="btn-main" id="restart">Заново</button>
  </div>
</div>
<div class="overlay" id="skinOverlay">
  <div class="modal">
    <h2>Скины бегуна</h2>
    <p class="best">Открываются каждые 50 очков рекорда</p>
    <div class="skins-grid" id="skinsGrid"></div>
    <button class="btn-main" id="closeSkins">Закрыть</button>
  </div>
</div>
<script>
if(window.Telegram && window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let W=0,H=0,tile=32;
const ROWS=13, GROUND_ROW=10, LEVEL_COLS=100;

function resizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  W=window.innerWidth; H=window.innerHeight;
  tile=H/ROWS;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeCanvas);

// ---------- Скины (открываются по рекорду очков) ----------
const SKINS=[
  {id:'classic', name:'Классика', unlock:0,   body:'#2E63C7', bodyDark:'#1D4A9E', shirt:'#E1443B', head:'#FFE0B2', cap:'#E1443B'},
  {id:'magma',   name:'Магма',    unlock:50,  body:'#7A1E10', bodyDark:'#4E1006', shirt:'#FF5A3D', head:'#FFE0B2', cap:'#FF5A3D'},
  {id:'ocean',   name:'Океан',    unlock:100, body:'#123A52', bodyDark:'#0A2436', shirt:'#4FB8E8', head:'#FFE0B2', cap:'#4FB8E8'},
  {id:'gold',    name:'Золото',   unlock:150, body:'#7A5D06', bodyDark:'#503D04', shirt:'#FFD700', head:'#FFE0B2', cap:'#FFD700'},
  {id:'plasma',  name:'Плазма',   unlock:200, body:'#3D1E63', bodyDark:'#26123F', shirt:'#A87BE0', head:'#FFE0B2', cap:'#A87BE0'},
  {id:'platinum',name:'Платина',  unlock:250, body:'#6E7590', bodyDark:'#4A4F63', shirt:'#E5E8F5', head:'#FFE0B2', cap:'#E5E8F5'},
];
// Особый тёмный скин "Моргот" — не выбирается вручную, включается временно при событии на 10000 очков
const MORGOTH_SKIN={ body:'#141418', bodyDark:'#050506', shirt:'#3A0A0A', head:'#2b2b32', cap:'#3A0A0A' };
let BEST=0, SELECTED_SKIN='classic';
function cloudAvailable(){ return window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage; }
function loadUserData(cb){
  if(cloudAvailable()){
    const tg=window.Telegram.WebApp;
    tg.CloudStorage.getItem('mario_best',(err,val)=>{
      BEST=(!err&&val)?(parseInt(val,10)||0):(parseInt(localStorage.getItem('mario_best')||'0',10));
      tg.CloudStorage.getItem('mario_skin',(err2,val2)=>{
        SELECTED_SKIN=(!err2&&val2)?val2:(localStorage.getItem('mario_skin')||'classic');
        localStorage.setItem('mario_best',String(BEST));
        localStorage.setItem('mario_skin',SELECTED_SKIN);
        cb();
      });
    });
  } else {
    BEST=parseInt(localStorage.getItem('mario_best')||'0',10);
    SELECTED_SKIN=localStorage.getItem('mario_skin')||'classic';
    cb();
  }
}
function setBest(v){
  BEST=v; localStorage.setItem('mario_best',String(v));
  if(cloudAvailable()) window.Telegram.WebApp.CloudStorage.setItem('mario_best',String(v),()=>{});
}
function setSkin(id){
  SELECTED_SKIN=id; localStorage.setItem('mario_skin',id);
  if(cloudAvailable()) window.Telegram.WebApp.CloudStorage.setItem('mario_skin',id,()=>{});
}
function getUnlocked(){ return SKINS.filter(s=>BEST>=s.unlock).map(s=>s.id); }
function currentSkin(){ return SKINS.find(s=>s.id===SELECTED_SKIN)||SKINS[0]; }
function renderSkinsGrid(){
  const grid=document.getElementById('skinsGrid');
  grid.innerHTML='';
  const unlocked=getUnlocked();
  SKINS.forEach(s=>{
    const isUnlocked=unlocked.includes(s.id);
    const div=document.createElement('div');
    div.className='skin-opt'+(isUnlocked?'':' locked')+(s.id===SELECTED_SKIN?' active':'');
    div.innerHTML = `<div style="width:20px;height:20px;border-radius:5px;background:${isUnlocked?s.body:'#ccc'}"></div>`+
      `<span class="name">${isUnlocked?s.name:'???'}</span>`+(isUnlocked?'':`<span class="lock">${s.unlock}</span>`);
    if(isUnlocked) div.onclick=()=>{ setSkin(s.id); renderSkinsGrid(); };
    grid.appendChild(div);
  });
}
document.getElementById('skinBtn').onclick=()=>{ renderSkinsGrid(); document.getElementById('skinOverlay').classList.add('show'); };
document.getElementById('closeSkins').onclick=()=>{ document.getElementById('skinOverlay').classList.remove('show'); };

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm=setTimeout(()=>t.classList.remove('show'), 1600);
}

// ---------- Уровень ----------
let solid, boxes, coins, enemies, flagCol, pitRanges;
function inPit(col){ return pitRanges.some(p=>col>=p[0] && col<=p[1]); }
function buildLevel(){
  solid=new Map();
  pitRanges=[[14,15],[32,33],[50,51],[68,69],[84,85]];
  boxes=[]; coins=[]; enemies=[];
  for(let c=0;c<LEVEL_COLS;c++){
    if(!inPit(c)) solid.set(c+','+GROUND_ROW, {type:'ground'});
  }
  const platformDefs=[
    {start:18, len:4, row:GROUND_ROW-3},
    {start:38, len:4, row:GROUND_ROW-3},
    {start:56, len:5, row:GROUND_ROW-4},
    {start:72, len:4, row:GROUND_ROW-3},
    {start:88, len:4, row:GROUND_ROW-3},
  ];
  platformDefs.forEach(p=>{ for(let i=0;i<p.len;i++) solid.set((p.start+i)+','+p.row, {type:'platform'}); });

  // Вопрос-блоки со случайными бонусами
  const boxTypes=['coin','coin','coin','star','mushroom','heart','coin','star'];
  const boxCols=[6, 10, 22, 26, 42, 46, 60, 64, 76, 80, 92];
  boxCols.forEach((c,i)=>{
    const row=GROUND_ROW-3;
    const box={col:c,row,used:false,kind:boxTypes[i%boxTypes.length]};
    boxes.push(box);
    solid.set(c+','+row, {type:'box', box});
  });
  const coinCols=[14,15,32,33,50,51,68,69,84,85, 19,20,21, 39,40,41, 89,90];
  coinCols.forEach((c,i)=>{ coins.push({col:c, row:GROUND_ROW-5-(i%2), collected:false}); });

  enemies.push({x:24*tile, minX:22*tile, maxX:30*tile, dir:1, alive:true});
  enemies.push({x:43*tile, minX:40*tile, maxX:48*tile, dir:-1, alive:true});
  enemies.push({x:62*tile, minX:59*tile, maxX:67*tile, dir:1, alive:true});
  enemies.push({x:78*tile, minX:76*tile, maxX:83*tile, dir:-1, alive:true});
  enemies.push({x:96*tile, minX:93*tile, maxX:99*tile, dir:1, alive:true});
  flagCol=97;
}
function isSolid(col,row){ return solid.has(col+','+row); }
function solidInfo(col,row){ return solid.get(col+','+row); }

// ---------- Физика ----------
const GRAVITY=0.55, MOVE_ACCEL=0.7, MAX_SPEED=4.6, FRICTION=0.85, JUMP_V=-12.5, JUMP2_V=-10.4, TERMINAL_V=13;
let player, camX, score, coinsCollected, lives, state, particles, milestoneShown;
let inputLeft=false, inputRight=false, inputJumpQueued=false;

function reset(){
  resizeCanvas();
  buildLevel();
  const skin=currentSkin();
  player={
    x:2*tile, y:(GROUND_ROW-1)*tile, w:tile*0.6, h:tile*0.92,
    vx:0, vy:0, grounded:false, dir:1, anim:0, hurtTimer:0,
    jumpsUsed:0, hangTimer:0, starTimer:0, mushroomTimer:0, morgothTimer:0, scale:1
  };
  camX=0; score=0; coinsCollected=0; lives=3; state='playing'; particles=[]; milestoneShown=new Set();
  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(loop);
}
function respawn(){
  player.x=2*tile; player.y=(GROUND_ROW-1)*tile; player.vx=0; player.vy=0; player.hurtTimer=50;
  player.starTimer=0; player.mushroomTimer=0; player.scale=1;
}
function loseLife(){
  if(player.starTimer>0 || player.morgothTimer>0) return;
  lives--;
  if(lives<=0){ gameOver(false); return; }
  respawn();
}
function gameOver(won){
  state='over';
  if(score>BEST){ setBest(score); }
  document.getElementById('overTitle').textContent = won ? 'Финиш! 🏁' : 'Игра окончена 💥';
  document.getElementById('overText').textContent = 'Монеты: '+coinsCollected+'   Очки: '+score+(score>BEST?'':'   Рекорд: '+BEST);
  document.getElementById('overlay').classList.add('show');
}
function checkMilestones(){
  [50,100,150,200,250,300].forEach(m=>{
    if(score>=m && !milestoneShown.has(m)){
      milestoneShown.add(m);
      if(m%100===0 && lives<5){ lives++; showToast('🎉 '+m+' очков! +1 ❤️'); }
      else showToast('✨ '+m+' очков! Новый скин доступен');
    }
  });
  if(coinsCollected>=500 && !milestoneShown.has('morgoth')){
    milestoneShown.add('morgoth');
    player.morgothTimer=1800; // 30 секунд при 60 fps
    showToast('💀 Тьма пробудилась! 30 сек неуязвимости');
  }
}

function rectsOverlapCols(px,pw){ return [Math.floor(px/tile), Math.floor((px+pw-1)/tile)]; }
function rectsOverlapRows(py,ph){ return [Math.floor(py/tile), Math.floor((py+ph-1)/tile)]; }

function applyBox(box){
  box.used=true;
  if(box.kind==='star'){
    player.starTimer=360; showToast('⭐ Неуязвимость!');
  } else if(box.kind==='mushroom'){
    player.mushroomTimer=480; player.scale=1.3; showToast('🍄 Ускорение и рост!');
  } else if(box.kind==='heart'){
    if(lives<5){ lives++; showToast('❤️ Дополнительная жизнь!'); } else { score+=30; showToast('❤️ Жизни максимум! +30 очков'); }
  } else {
    score+=20; coinsCollected++; showToast('🪙 +20 очков');
  }
  const cx=box.col*tile+tile/2, cy=box.row*tile;
  for(let i=0;i<8;i++) particles.push({x:cx,y:cy,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:20,color:'#FFD700'});
}

function updatePlayer(){
  if(player.hurtTimer>0) player.hurtTimer--;
  if(player.starTimer>0) player.starTimer--;
  if(player.morgothTimer>0) player.morgothTimer--;
  if(player.mushroomTimer>0){ player.mushroomTimer--; if(player.mushroomTimer===0) player.scale=1; }

  const speedMul = player.mushroomTimer>0 ? 1.3 : 1;
  // управление: тачпад-свайп (сила пропорциональна смещению пальца) или кнопки/клавиши
  let moveDir=0, dragMul=1;
  if(inputLeft){ moveDir=-1; dragMul = padActive ? Math.max(0.35,padSpeed) : 1; }
  else if(inputRight){ moveDir=1; dragMul = padActive ? Math.max(0.35,padSpeed) : 1; }

  if(moveDir!==0){ player.vx+=MOVE_ACCEL*moveDir*speedMul*dragMul; player.dir=moveDir; }
  else player.vx*=FRICTION;
  const maxSp=MAX_SPEED*speedMul;
  player.vx=Math.max(-maxSp, Math.min(maxSp, player.vx));

  if(inputJumpQueued){
    if(player.grounded){ player.vy=JUMP_V; player.grounded=false; player.jumpsUsed=1; }
    else if(player.jumpsUsed===1){
      player.vy=JUMP2_V; player.jumpsUsed=2; player.hangTimer=12;
      player.vx += player.dir*3.2; // рывок вперёд
      for(let i=0;i<10;i++) particles.push({x:player.x+player.w/2,y:player.y+player.h*0.6,vx:-player.dir*(1+Math.random()*2)-player.vx*0.1,vy:(Math.random()-0.5)*1.5,life:18,color:'#fff'});
    }
  }
  inputJumpQueued=false;

  const w=player.w*player.scale, h=player.h*player.scale;
  player.x+=player.vx;
  if(player.x<0) player.x=0;
  let [c1,c2]=rectsOverlapCols(player.x,w);
  let [r1,r2]=rectsOverlapRows(player.y,h);
  for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++){
    if(isSolid(c,r)){
      if(player.vx>0) player.x=c*tile-w;
      else if(player.vx<0) player.x=(c+1)*tile;
      player.vx=0;
    }
  }

  player.vy+=(player.hangTimer>0 ? GRAVITY*0.18 : GRAVITY);
  if(player.hangTimer>0) player.hangTimer--;
  player.vy=Math.min(player.vy, TERMINAL_V);
  player.y+=player.vy;
  player.grounded=false;
  [c1,c2]=rectsOverlapCols(player.x,w);
  [r1,r2]=rectsOverlapRows(player.y,h);
  for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++){
    if(isSolid(c,r)){
      if(player.vy>0){ player.y=r*tile-h; player.vy=0; player.grounded=true; player.jumpsUsed=0; }
      else if(player.vy<0){
        player.y=(r+1)*tile; player.vy=0;
        const info=solidInfo(c,r);
        if(info && info.type==='box' && !info.box.used){ applyBox(info.box); }
      }
    }
  }
  if(player.y>H+300){ loseLife(); return; }

  coins.forEach(co=>{
    if(co.collected) return;
    const cx=co.col*tile+tile/2, cy=co.row*tile+tile/2;
    const px=player.x+w/2, py=player.y+h/2;
    if(Math.hypot(cx-px,cy-py)<tile*0.6){
      co.collected=true; score+=10; coinsCollected++;
      for(let i=0;i<6;i++) particles.push({x:cx,y:cy,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:16,color:'#FFD700'});
    }
  });

  enemies.forEach(en=>{
    if(!en.alive) return;
    en.x+=en.dir*1.5;
    if(en.x<en.minX||en.x>en.maxX) en.dir*=-1;
    const ex=en.x, ey=(GROUND_ROW-1)*tile, ew=tile*0.7, eh=tile*0.7;
    if(player.x<ex+ew && player.x+w>ex && player.y<ey+eh && player.y+h>ey){
      if(player.starTimer>0){
        en.alive=false; score+=30;
        for(let i=0;i<10;i++) particles.push({x:ex+ew/2,y:ey+eh/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:22,color:'#FFD700'});
      } else if(player.vy>0 && (player.y+h)-ey<tile*0.5){
        en.alive=false; player.vy=JUMP_V*0.6; score+=50;
        for(let i=0;i<10;i++) particles.push({x:ex+ew/2,y:ey+eh/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:22,color:'#3A3A46'});
      } else if(player.hurtTimer<=0){
        loseLife();
      }
    }
  });

  if(player.x/tile>flagCol-1){ gameOver(true); return; }

  checkMilestones();
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});
  particles=particles.filter(p=>p.life>0);
  camX=Math.max(0, Math.min(player.x-W*0.35, LEVEL_COLS*tile-W));
}

function loop(){
  if(state==='playing') updatePlayer();
  draw();
  if(state==='playing') requestAnimationFrame(loop);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const dark = player.morgothTimer>0;
  const sky=ctx.createLinearGradient(0,0,0,H);
  if(dark){ sky.addColorStop(0,'#15121e'); sky.addColorStop(1,'#26202f'); }
  else { sky.addColorStop(0,'#8FE0D8'); sky.addColorStop(1,'#DFF7EA'); }
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=dark?0.15:0.55; ctx.fillStyle='#fff';
  for(let i=0;i<6;i++){
    const bx=(i*260 - camX*0.3) % (W+300) - 150;
    ctx.beginPath();
    ctx.ellipse(bx, 60+((i*53)%80), 30,16,0,0,Math.PI*2);
    ctx.ellipse(bx+22, 65+((i*53)%80), 22,12,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  if(dark){
    // полумесяц
    ctx.save();
    const mx=W*0.82, my=H*0.14, mr=H*0.05;
    ctx.fillStyle='#E8E4F0';
    ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle= dark ? '#15121e' : '#26202f';
    ctx.beginPath(); ctx.arc(mx+mr*0.42,my-mr*0.15,mr*0.88,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // летающие вороны на фоне
    ctx.save(); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.globalAlpha=0.6;
    for(let i=0;i<5;i++){
      const bx=((i*180 + Date.now()/12) % (W+200)) - 100;
      const by=H*0.18+((i*47)%60);
      ctx.beginPath();
      ctx.moveTo(bx-8,by); ctx.quadraticCurveTo(bx-3,by-6,bx,by);
      ctx.quadraticCurveTo(bx+3,by-6,bx+8,by);
      ctx.stroke();
    }
    ctx.restore();
  }

  // дальние холмы (параллакс)
  ctx.save(); ctx.globalAlpha=dark?0.2:0.35; ctx.fillStyle=dark?'#2a2333':'#5FCB9A';
  for(let i=0;i<8;i++){
    const hx=(i*180 - camX*0.15) % (W+260) - 130;
    const hy=H*0.62;
    ctx.beginPath();
    ctx.ellipse(hx, hy, 110, 60, 0, Math.PI, 0);
    ctx.fill();
  }
  ctx.restore();
  // ближние холмы (параллакс сильнее)
  ctx.save(); ctx.globalAlpha=dark?0.28:0.45; ctx.fillStyle=dark?'#1c1826':'#4FBF88';
  for(let i=0;i<10;i++){
    const hx=(i*140 - camX*0.35) % (W+220) - 110;
    const hy=H*0.68;
    ctx.beginPath();
    ctx.ellipse(hx, hy, 85, 46, 0, Math.PI, 0);
    ctx.fill();
  }
  ctx.restore();

  const c1=Math.floor(camX/tile)-1, c2=Math.ceil((camX+W)/tile)+1;
  for(let c=c1;c<=c2;c++) for(let r=0;r<ROWS;r++){
    if(!isSolid(c,r)) continue;
    const info=solidInfo(c,r);
    const x=c*tile-camX, y=r*tile;
    if(info.type==='ground'){
      ctx.fillStyle='#8B5E34'; ctx.fillRect(x,y,tile+1,H-y+4);
      ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(x,y,tile+1,tile*0.1);
      ctx.fillStyle='#6FBF5C'; ctx.fillRect(x,y,tile+1,tile*0.28);
      // травинки
      ctx.strokeStyle='#4FA047'; ctx.lineWidth=1.4;
      ctx.beginPath();
      ctx.moveTo(x+tile*0.2,y); ctx.lineTo(x+tile*0.15,y-tile*0.1);
      ctx.moveTo(x+tile*0.5,y); ctx.lineTo(x+tile*0.55,y-tile*0.13);
      ctx.moveTo(x+tile*0.8,y); ctx.lineTo(x+tile*0.75,y-tile*0.09);
      ctx.stroke();
    } else if(info.type==='platform'){
      ctx.fillStyle='rgba(30,70,53,0.15)'; ctx.beginPath(); ctx.ellipse(x+tile/2,y+tile+4,tile*0.42,tile*0.12,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#C97A1E'; ctx.fillRect(x,y,tile+1,tile);
      ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(x,y,tile+1,tile*0.25);
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(x,y+tile*0.82,tile+1,tile*0.18);
    } else if(info.type==='box'){
      ctx.fillStyle='rgba(30,70,53,0.12)'; ctx.beginPath(); ctx.ellipse(x+tile/2,y+tile+4,tile*0.4,tile*0.1,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = info.box.used ? '#B08A5A' : '#FFC94D';
      ctx.fillRect(x+2,y+2,tile-3,tile-3);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(x+2,y+2,tile-3,tile*0.2);
      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2;
      ctx.strokeRect(x+2,y+2,tile-3,tile-3);
      if(!info.box.used){
        ctx.fillStyle='#8B5E1E';
        ctx.font='bold '+(tile*0.5)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        const icon = info.box.kind==='star'?'★':info.box.kind==='mushroom'?'M':info.box.kind==='heart'?'♥':'?';
        ctx.fillText(icon, x+tile/2, y+tile/2+1);
      }
    }
  }
  if(dark){
    ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle='#000';
    for(let c=c1;c<=c2;c+=3){
      if(!isSolid(c,GROUND_ROW) || c%9>=4) continue;
      const gx=c*tile-camX, gy=GROUND_ROW*tile;
      const gh=tile*0.5;
      ctx.fillRect(gx+tile*0.25, gy-gh, tile*0.5, gh);
      ctx.fillRect(gx+tile*0.42, gy-gh-tile*0.2, tile*0.16, tile*0.2);
    }
    ctx.restore();
  }
  coins.forEach(co=>{
    if(co.collected) return;
    const x=co.col*tile-camX+tile/2, y=co.row*tile+tile/2;
    if(x<-tile||x>W+tile) return;
    const r=tile*0.22;
    const grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.2,x,y,r);
    grad.addColorStop(0,'#FFF3B0'); grad.addColorStop(1,'#E8A317');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#B5680C'; ctx.lineWidth=1.6; ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(x,y,r*0.62,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#B5680C';
    ctx.font='bold '+(r*1.1)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('¢', x, y+0.5);
  });
  enemies.forEach(en=>{
    if(!en.alive) return;
    const x=en.x-camX, y=(GROUND_ROW-1)*tile, s=tile*0.7;
    if(x<-tile||x>W+tile) return;
    ctx.fillStyle='rgba(30,70,53,0.2)'; ctx.beginPath(); ctx.ellipse(x+s/2,y+s+3,s*0.42,s*0.12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2b2b36'; ctx.beginPath(); ctx.arc(x+s/2,y+s/2+2,s/2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff5a3d'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+s/2,y-2); ctx.lineTo(x+s/2,y-s*0.3); ctx.stroke();
    ctx.fillStyle='#ff5a3d'; ctx.beginPath(); ctx.arc(x+s/2,y-s*0.32,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x+s*0.35,y+s*0.45,2.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.65,y+s*0.45,2.4,0,Math.PI*2); ctx.fill();
  });
  const fx=flagCol*tile-camX;
  if(fx>-tile && fx<W+tile){
    ctx.fillStyle='#8B5E34'; ctx.fillRect(fx+tile*0.45,(GROUND_ROW-5)*tile,tile*0.1,tile*5);
    ctx.fillStyle='#F58FB3';
    ctx.beginPath();
    ctx.moveTo(fx+tile*0.55,(GROUND_ROW-5)*tile);
    ctx.lineTo(fx+tile*1.3,(GROUND_ROW-4.6)*tile);
    ctx.lineTo(fx+tile*0.55,(GROUND_ROW-4.2)*tile);
    ctx.fill();
  }
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/22); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });
  ctx.save();
  ctx.fillStyle='rgba(30,70,53,0.22)';
  ctx.beginPath();
  ctx.ellipse(player.x-camX+player.w*player.scale/2, player.y+player.h*player.scale+2, player.w*player.scale*0.5, player.w*player.scale*0.18, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  drawPlayer();
  ctx.fillStyle='#1E4635'; ctx.strokeStyle='#fff'; ctx.lineWidth=3;
  ctx.font='bold '+(H*0.04)+'px "Baloo 2", sans-serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.strokeText('🪙 '+coinsCollected+'      🪙 '+score, 16, H*0.08);
  ctx.fillText('🪙 '+coinsCollected+'      🪙 '+score, 16, H*0.08);
  ctx.textAlign='right';
  ctx.strokeText('❤️ '+lives, W-16, H*0.08);
  ctx.fillText('❤️ '+lives, W-16, H*0.08);
}

function drawPlayer(){
  const skin = player.morgothTimer>0 ? MORGOTH_SKIN : currentSkin();
  const scale=player.scale;
  const w=player.w*scale, h=player.h*scale;
  const x=player.x-camX, y=player.y;
  ctx.save();
  ctx.translate(x+w/2, y+h/2);
  if(player.dir<0) ctx.scale(-1,1);
  if(player.starTimer>0){
    const hue=(Date.now()/8)%360;
    ctx.filter=`hue-rotate(${hue}deg) saturate(1.6)`;
  }
  if(player.hurtTimer>0 && Math.floor(player.hurtTimer/4)%2===0) ctx.globalAlpha=0.4;

  player.anim += Math.abs(player.vx)*0.18;
  const legOff = player.grounded ? Math.sin(player.anim)*h*0.14 : (player.hangTimer>0 ? h*0.04 : Math.sin(Date.now()/90)*h*0.06);

  // LEGO-стиль: блочные ноги (тёмный тон), торс (основной цвет), рукава/кепка (акцентный цвет "рубашки")
  ctx.fillStyle=skin.bodyDark;
  ctx.fillRect(-w*0.26, h*0.24+legOff, w*0.2, h*0.28);
  ctx.fillRect(w*0.06, h*0.24-legOff, w*0.2, h*0.28);

  ctx.fillStyle=skin.body;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(-w*0.4,-h*0.16,w*0.8,h*0.44,w*0.08); else ctx.rect(-w*0.4,-h*0.16,w*0.8,h*0.44);
  ctx.fill();
  // нагрудная полоса акцентного цвета
  ctx.fillStyle=skin.shirt;
  ctx.fillRect(-w*0.4,-h*0.16,w*0.8,h*0.14);
  // руки акцентного цвета
  ctx.fillStyle=skin.shirt;
  ctx.fillRect(-w*0.5,-h*0.1,w*0.12,h*0.32);
  ctx.fillRect(w*0.38,-h*0.1,w*0.12,h*0.32);

  // голова (цилиндр LEGO)
  ctx.fillStyle=skin.head;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(-w*0.32,-h*0.5,w*0.64,h*0.36,w*0.14); else ctx.rect(-w*0.32,-h*0.5,w*0.64,h*0.36);
  ctx.fill();
  if(player.morgothTimer>0){
    // тёмная аура вокруг головы
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.fillStyle='#6B0F1A';
    ctx.beginPath(); ctx.arc(0,-h*0.32,w*0.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // кепка / чёрная корона
  if(player.morgothTimer>0){
    ctx.fillStyle='#0a0a0d';
    ctx.beginPath(); ctx.rect(-w*0.34,-h*0.56,w*0.68,h*0.1); ctx.fill();
    ctx.beginPath();
    const spikes=5, baseY=-h*0.56;
    for(let i=0;i<spikes;i++){
      const sx=-w*0.3+i*(w*0.6/(spikes-1));
      ctx.moveTo(sx-w*0.05, baseY);
      ctx.lineTo(sx, baseY-h*0.16);
      ctx.lineTo(sx+w*0.05, baseY);
    }
    ctx.fill();
    ctx.fillStyle='#7A0F1A';
    for(let i=0;i<spikes;i++){
      const sx=-w*0.3+i*(w*0.6/(spikes-1));
      ctx.beginPath(); ctx.arc(sx, baseY-h*0.02, w*0.018, 0, Math.PI*2); ctx.fill();
    }
  } else {
    ctx.fillStyle=skin.cap;
    ctx.beginPath(); ctx.rect(-w*0.1,-h*0.62,w*0.2,h*0.14); ctx.fill();
    ctx.beginPath(); ctx.rect(-w*0.34,-h*0.52,w*0.68,h*0.12); ctx.fill();
  }
  // глаза
  if(player.morgothTimer>0){
    ctx.fillStyle='#ff1a1a';
    ctx.save(); ctx.shadowColor='#ff1a1a'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.ellipse(w*0.12,-h*0.35,w*0.07,w*0.045,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-w*0.08,-h*0.35,w*0.07,w*0.045,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // злой оскал вместо улыбки
    ctx.strokeStyle='#ff1a1a'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(0.02*w,-h*0.2,w*0.09,1.1*Math.PI,1.9*Math.PI); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.moveTo(-0.02*w,-h*0.26); ctx.lineTo(-0.05*w,-h*0.22); ctx.lineTo(0.01*w,-h*0.22); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0.1*w,-h*0.26); ctx.lineTo(0.07*w,-h*0.22); ctx.lineTo(0.13*w,-h*0.22); ctx.fill();
  } else {
    ctx.fillStyle='#1E4635';
    ctx.beginPath(); ctx.arc(w*0.12,-h*0.35,w*0.045,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-w*0.08,-h*0.35,w*0.045,0,Math.PI*2); ctx.fill();
    // улыбка
    ctx.strokeStyle='#1E4635'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(0.02*w,-h*0.28,w*0.09,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
  }

  ctx.filter='none';
  ctx.restore();
}

// ---------- Ввод ----------
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') inputLeft=true;
  if(e.key==='ArrowRight') inputRight=true;
  if(e.key===' '||e.key==='ArrowUp') inputJumpQueued=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft') inputLeft=false;
  if(e.key==='ArrowRight') inputRight=false;
});

// Тачпад: держишь палец и ведёшь в сторону — герой бежит туда; короткий тап без движения — прыжок
let padActive=false, padStartX=0, padDragX=0, padMoved=false, padStartTime=0;
const DRAG_THRESHOLD=10;   // px, чтобы считать это движением, а не тапом
const DRAG_FULL=60;        // px смещения для полной скорости

function padDown(clientX){
  padActive=true; padStartX=clientX; padDragX=0; padMoved=false; padStartTime=Date.now();
}
function padMove(clientX){
  if(!padActive) return;
  padDragX=clientX-padStartX;
  if(Math.abs(padDragX)>DRAG_THRESHOLD) padMoved=true;
  const norm=Math.max(-1,Math.min(1,padDragX/DRAG_FULL));
  inputLeft = norm<-0.08;
  inputRight = norm>0.08;
  padSpeed = Math.abs(norm);
}
function padUp(){
  if(padActive && !padMoved && (Date.now()-padStartTime)<260){
    inputJumpQueued=true;
  }
  padActive=false; inputLeft=false; inputRight=false; padSpeed=0;
}
let padSpeed=0;
canvas.addEventListener('touchstart',e=>{ padDown(e.touches[0].clientX); },{passive:true});
canvas.addEventListener('touchmove',e=>{ padMove(e.touches[0].clientX); },{passive:true});
canvas.addEventListener('touchend',()=>{ padUp(); },{passive:true});
canvas.addEventListener('mousedown',e=>{ padDown(e.clientX); });
canvas.addEventListener('mousemove',e=>{ if(padActive) padMove(e.clientX); });
canvas.addEventListener('mouseup',()=>{ padUp(); });

// Переключаемые обычные кнопки (для тех, кто не любит тачпад-режим)
const ctrlToggle=document.getElementById('ctrlToggle');
const btnPad=document.getElementById('btnPad');
let padButtonsOn=false;
ctrlToggle.onclick=()=>{
  padButtonsOn=!padButtonsOn;
  btnPad.classList.toggle('show', padButtonsOn);
  ctrlToggle.textContent = padButtonsOn ? '👋' : '🎮';
};
const leftBtn=document.getElementById('leftBtn');
const rightBtn=document.getElementById('rightBtn');
const jumpPadBtn=document.getElementById('jumpPadBtn');
['touchstart','mousedown'].forEach(ev=>{
  leftBtn.addEventListener(ev,e=>{e.preventDefault();inputLeft=true;});
  rightBtn.addEventListener(ev,e=>{e.preventDefault();inputRight=true;});
  jumpPadBtn.addEventListener(ev,e=>{e.preventDefault();inputJumpQueued=true;});
});
['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>{
  leftBtn.addEventListener(ev,()=>inputLeft=false);
  rightBtn.addEventListener(ev,()=>inputRight=false);
});

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('startOverlay').style.display='none';
};

document.getElementById('restart').onclick=reset;
function boot(){ loadUserData(reset); }
window.addEventListener('load', boot);
if(document.readyState==='complete') boot();
</script>
