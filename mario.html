<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ретро-Бегун</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E4635;--ink-soft:#4C7767;--green:#35C57A;--green-dark:#1E9E5E;--card-bg:#FFFFFF;--yellow:#FFC94D;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;padding:0;height:100%;width:100%;font-family:'Nunito',sans-serif;color:var(--ink);
    background:#8FE0D8;overflow:hidden;}
  .wrap{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}
  .back-btn{position:fixed;top:12px;left:12px;width:42px;height:42px;border-radius:50%;background:var(--card-bg);
    display:flex;align-items:center;justify-content:center;font-size:19px;text-decoration:none;color:var(--ink);
    box-shadow:0 6px 0 rgba(0,0,0,0.06),0 8px 14px -6px rgba(30,70,53,0.3);z-index:20;}
  .back-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  .pad{position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;
    padding:0 16px;z-index:20;pointer-events:none;}
  .pad-left{display:flex;gap:10px;pointer-events:auto;}
  .pad-btn{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.85);border:none;font-size:24px;
    color:var(--ink);box-shadow:0 6px 0 rgba(0,0,0,0.1),0 8px 14px -6px rgba(30,70,53,0.3);}
  .pad-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.1);}
  #jumpBtn{width:74px;height:74px;font-size:26px;background:rgba(255,201,77,0.95);pointer-events:auto;}
  .overlay{position:fixed;inset:0;background:rgba(30,70,53,0.55);display:none;align-items:center;justify-content:center;z-index:30;}
  .overlay.show{display:flex;}
  .modal{background:var(--card-bg);border-radius:22px;padding:26px 24px;text-align:center;max-width:300px;width:88%;
    box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);}
  .modal h2{font-family:'Baloo 2',sans-serif;margin:0 0 8px;font-size:22px;color:var(--green-dark);}
  .modal p{font-weight:700;color:var(--ink-soft);margin:0 0 10px;}
  .btn-main{background:linear-gradient(135deg,var(--green),#7BE3A6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:16px;padding:12px 26px;border-radius:16px;box-shadow:0 8px 0 var(--green-dark);margin-top:6px;}
  .btn-main:active{transform:translateY(4px);box-shadow:0 4px 0 var(--green-dark);}
</style>
</head>
<body>
<a class="back-btn" href="index.html">⬅️</a>
<div class="wrap"><canvas id="board"></canvas></div>
<div class="pad">
  <div class="pad-left">
    <button class="pad-btn" id="leftBtn">◀️</button>
    <button class="pad-btn" id="rightBtn">▶️</button>
  </div>
  <button class="pad-btn" id="jumpBtn">⬆️</button>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="overTitle">Игра окончена</h2>
    <p id="overText">Монеты: 0</p>
    <button class="btn-main" id="restart">Заново</button>
  </div>
</div>
<script>
if(window.Telegram && window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let W=0,H=0,tile=32;
const ROWS=10, GROUND_ROW=7, LEVEL_COLS=90;

function resizeCanvas(){
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  W=window.innerWidth; H=window.innerHeight;
  tile=H/ROWS;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeCanvas);

// ---------- Уровень ----------
let solid; // Map "col,row" -> {type:'ground'|'platform'|'box', box?}
let boxes, coins, enemies, flagCol, pitRanges;

function inPit(col){ return pitRanges.some(p=>col>=p[0] && col<=p[1]); }

function buildLevel(){
  solid=new Map();
  pitRanges=[[12,13],[30,31],[48,49],[66,67]];
  boxes=[]; coins=[]; enemies=[];
  for(let c=0;c<LEVEL_COLS;c++){
    if(!inPit(c)){
      solid.set(c+','+GROUND_ROW, {type:'ground'});
    }
  }
  // Летающие платформы с блоками
  const platformDefs=[
    {start:16, len:4, row:GROUND_ROW-3},
    {start:36, len:4, row:GROUND_ROW-3},
    {start:54, len:5, row:GROUND_ROW-4},
    {start:74, len:4, row:GROUND_ROW-3},
  ];
  platformDefs.forEach(p=>{
    for(let i=0;i<p.len;i++) solid.set((p.start+i)+','+p.row, {type:'platform'});
  });
  // Вопрос-блоки (боксы) — парят отдельно, дают монеты
  const boxCols=[8, 20, 40, 58, 78];
  boxCols.forEach(c=>{
    const row=GROUND_ROW-3;
    const box={col:c,row,used:false};
    boxes.push(box);
    solid.set(c+','+row, {type:'box', box});
  });
  // Монетки в воздухе над ямами и платформами
  const coinCols=[12,13,30,31,48,49,66,67, 17,18,19, 37,38,39, 75,76];
  coinCols.forEach((c,i)=>{
    coins.push({col:c, row:GROUND_ROW-5-(i%2), collected:false});
  });
  // Враги-бомбы патрулируют по земле
  enemies.push({x:(22)*tile, minX:20*tile, maxX:28*tile, dir:1, alive:true});
  enemies.push({x:(41)*tile, minX:38*tile, maxX:46*tile, dir:-1, alive:true});
  enemies.push({x:(60)*tile, minX:57*tile, maxX:65*tile, dir:1, alive:true});
  enemies.push({x:(80)*tile, minX:78*tile, maxX:86*tile, dir:-1, alive:true});
  flagCol=88;
}

function isSolid(col,row){ return solid.has(col+','+row); }
function solidInfo(col,row){ return solid.get(col+','+row); }

// ---------- Игрок ----------
const GRAVITY=0.9, MOVE_ACCEL=0.9, MAX_SPEED=5.2, FRICTION=0.82, JUMP_V=-15.5;
let player, camX, score, coinsCollected, lives, state, particles, winTimer;
let inputLeft=false, inputRight=false, inputJumpQueued=false;

function reset(){
  resizeCanvas();
  buildLevel();
  player={x:2*tile, y:(GROUND_ROW-1)*tile, w:tile*0.62, h:tile*0.9, vx:0, vy:0, grounded:false, dir:1, anim:0, hurtTimer:0};
  camX=0; score=0; coinsCollected=0; lives=3; state='playing'; particles=[]; winTimer=0;
  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(loop);
}
function respawn(){
  player.x=2*tile; player.y=(GROUND_ROW-1)*tile; player.vx=0; player.vy=0; player.hurtTimer=40;
}
function loseLife(){
  lives--;
  if(lives<=0){ gameOver(false); return; }
  respawn();
}
function gameOver(won){
  state='over';
  document.getElementById('overTitle').textContent = won ? 'Финиш! 🏁' : 'Игра окончена 💥';
  document.getElementById('overText').textContent = 'Монеты: '+coinsCollected+'   Очки: '+score;
  document.getElementById('overlay').classList.add('show');
}

function rectsOverlapCols(px,pw){ return [Math.floor(px/tile), Math.floor((px+pw-1)/tile)]; }
function rectsOverlapRows(py,ph){ return [Math.floor(py/tile), Math.floor((py+ph-1)/tile)]; }

function updatePlayer(){
  if(player.hurtTimer>0) player.hurtTimer--;
  // управление
  if(inputLeft){ player.vx-=MOVE_ACCEL; player.dir=-1; }
  if(inputRight){ player.vx+=MOVE_ACCEL; player.dir=1; }
  if(!inputLeft&&!inputRight) player.vx*=FRICTION;
  player.vx=Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
  if(inputJumpQueued && player.grounded){ player.vy=JUMP_V; player.grounded=false; }
  inputJumpQueued=false;

  // горизонталь
  player.x+=player.vx;
  if(player.x<0) player.x=0;
  let [c1,c2]=rectsOverlapCols(player.x,player.w);
  let [r1,r2]=rectsOverlapRows(player.y,player.h);
  for(let r=r1;r<=r2;r++){
    for(let c=c1;c<=c2;c++){
      if(isSolid(c,r)){
        if(player.vx>0){ player.x=c*tile-player.w; }
        else if(player.vx<0){ player.x=(c+1)*tile; }
        player.vx=0;
      }
    }
  }
  // гравитация
  player.vy+=GRAVITY;
  player.vy=Math.min(player.vy, 20);
  player.y+=player.vy;
  player.grounded=false;
  [c1,c2]=rectsOverlapCols(player.x,player.w);
  [r1,r2]=rectsOverlapRows(player.y,player.h);
  for(let r=r1;r<=r2;r++){
    for(let c=c1;c<=c2;c++){
      if(isSolid(c,r)){
        if(player.vy>0){
          player.y=r*tile-player.h; player.vy=0; player.grounded=true;
        } else if(player.vy<0){
          player.y=(r+1)*tile; player.vy=0;
          const info=solidInfo(c,r);
          if(info && info.type==='box' && !info.box.used){
            info.box.used=true;
            score+=50; coinsCollected++;
            for(let i=0;i<8;i++) particles.push({x:c*tile+tile/2,y:r*tile,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:20,color:'#FFD700'});
          }
        }
      }
    }
  }
  // упал в яму
  if(player.y>H+200){ loseLife(); return; }

  // монеты
  coins.forEach(co=>{
    if(co.collected) return;
    const cx=co.col*tile+tile/2, cy=co.row*tile+tile/2;
    const px=player.x+player.w/2, py=player.y+player.h/2;
    if(Math.hypot(cx-px,cy-py)<tile*0.6){
      co.collected=true; score+=10; coinsCollected++;
      for(let i=0;i<6;i++) particles.push({x:cx,y:cy,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:16,color:'#FFD700'});
    }
  });

  // враги
  enemies.forEach(en=>{
    if(!en.alive) return;
    en.x+=en.dir*1.6;
    if(en.x<en.minX||en.x>en.maxX) en.dir*=-1;
    const ex=en.x, ey=(GROUND_ROW-1)*tile, ew=tile*0.7, eh=tile*0.7;
    if(player.x<ex+ew && player.x+player.w>ex && player.y<ey+eh && player.y+player.h>ey){
      if(player.vy>0 && (player.y+player.h)-ey<tile*0.5){
        en.alive=false; player.vy=JUMP_V*0.6; score+=50;
        for(let i=0;i<10;i++) particles.push({x:ex+ew/2,y:ey+eh/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:22,color:'#3A3A46'});
      } else if(player.hurtTimer<=0){
        loseLife();
      }
    }
  });

  // флаг
  if(player.x/tile>flagCol-1){ gameOver(true); }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});
  particles=particles.filter(p=>p.life>0);

  camX=Math.max(0, Math.min(player.x-W*0.35, LEVEL_COLS*tile-W));
}

function loop(){
  if(state==='playing') updatePlayer();
  draw();
  if(state==='playing') requestAnimationFrame(loop);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#8FE0D8'); sky.addColorStop(1,'#DFF7EA');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // облака (параллакс)
  ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle='#fff';
  for(let i=0;i<6;i++){
    const bx=(i*260 - camX*0.3) % (W+300) - 150;
    ctx.beginPath();
    ctx.ellipse(bx, 60+((i*53)%80), 30,16,0,0,Math.PI*2);
    ctx.ellipse(bx+22, 65+((i*53)%80), 22,12,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  const c1=Math.floor(camX/tile)-1, c2=Math.ceil((camX+W)/tile)+1;

  // земля и платформы
  for(let c=c1;c<=c2;c++){
    for(let r=0;r<ROWS;r++){
      if(!isSolid(c,r)) continue;
      const info=solidInfo(c,r);
      const x=c*tile-camX, y=r*tile;
      if(info.type==='ground'){
        ctx.fillStyle='#8B5E34';
        ctx.fillRect(x,y,tile+1,H-y+4);
        ctx.fillStyle='#6FBF5C';
        ctx.fillRect(x,y,tile+1,tile*0.28);
      } else if(info.type==='platform'){
        ctx.fillStyle='#C97A1E';
        ctx.fillRect(x,y,tile+1,tile);
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.fillRect(x,y,tile+1,tile*0.25);
      } else if(info.type==='box'){
        ctx.fillStyle = info.box.used ? '#B08A5A' : '#FFC94D';
        ctx.fillRect(x+2,y+2,tile-3,tile-3);
        ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2;
        ctx.strokeRect(x+2,y+2,tile-3,tile-3);
        if(!info.box.used){
          ctx.fillStyle='#8B5E1E';
          ctx.font='bold '+(tile*0.5)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('?', x+tile/2, y+tile/2+1);
        }
      }
    }
  }

  // монеты
  coins.forEach(co=>{
    if(co.collected) return;
    const x=co.col*tile-camX+tile/2, y=co.row*tile+tile/2;
    if(x<-tile||x>W+tile) return;
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(x,y,tile*0.22,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#E8A317'; ctx.lineWidth=2; ctx.stroke();
  });

  // враги
  enemies.forEach(en=>{
    if(!en.alive) return;
    const x=en.x-camX, y=(GROUND_ROW-1)*tile, s=tile*0.7;
    if(x<-tile||x>W+tile) return;
    ctx.fillStyle='#2b2b36';
    ctx.beginPath(); ctx.arc(x+s/2,y+s/2+2,s/2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff5a3d'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+s/2,y-2); ctx.lineTo(x+s/2,y-s*0.3); ctx.stroke();
    ctx.fillStyle='#ff5a3d';
    ctx.beginPath(); ctx.arc(x+s/2,y-s*0.32,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x+s*0.35,y+s*0.45,2.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.65,y+s*0.45,2.4,0,Math.PI*2); ctx.fill();
  });

  // флаг
  const fx=flagCol*tile-camX;
  if(fx>-tile && fx<W+tile){
    ctx.fillStyle='#8B5E34';
    ctx.fillRect(fx+tile*0.45,(GROUND_ROW-5)*tile,tile*0.1,tile*5);
    ctx.fillStyle='#F58FB3';
    ctx.beginPath();
    ctx.moveTo(fx+tile*0.55,(GROUND_ROW-5)*tile);
    ctx.lineTo(fx+tile*1.3,(GROUND_ROW-4.6)*tile);
    ctx.lineTo(fx+tile*0.55,(GROUND_ROW-4.2)*tile);
    ctx.fill();
  }

  // частицы
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/22);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });

  drawPlayer();

  // HUD
  ctx.fillStyle='#1E4635';
  ctx.strokeStyle='#fff'; ctx.lineWidth=3;
  ctx.font='bold '+(H*0.045)+'px "Baloo 2", sans-serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.strokeText('🪙 '+coinsCollected, 16, H*0.07);
  ctx.fillText('🪙 '+coinsCollected, 16, H*0.07);
  ctx.textAlign='right';
  ctx.strokeText('❤️ '+lives, W-16, H*0.07);
  ctx.fillText('❤️ '+lives, W-16, H*0.07);
}

function drawPlayer(){
  const x=player.x-camX, y=player.y;
  const w=player.w, h=player.h;
  ctx.save();
  ctx.translate(x+w/2, y+h/2);
  if(player.dir<0) ctx.scale(-1,1);
  if(player.hurtTimer>0 && Math.floor(player.hurtTimer/4)%2===0) ctx.globalAlpha=0.4;
  // ноги (анимация бега)
  player.anim += Math.abs(player.vx)*0.15;
  const legOff=player.grounded ? Math.sin(player.anim)*h*0.12 : 0;
  ctx.fillStyle='#1E9E5E';
  ctx.fillRect(-w*0.28, h*0.28+legOff, w*0.22, h*0.24);
  ctx.fillRect(w*0.06, h*0.28-legOff, w*0.22, h*0.24);
  // тело
  ctx.fillStyle='#35C57A';
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(-w*0.42,-h*0.15,w*0.84,h*0.5,w*0.2); else ctx.rect(-w*0.42,-h*0.15,w*0.84,h*0.5);
  ctx.fill();
  // голова
  ctx.fillStyle='#FFE0B2';
  ctx.beginPath(); ctx.arc(0,-h*0.32,w*0.42,0,Math.PI*2); ctx.fill();
  // кепка (зелёный плюмбоб-стиль)
  ctx.fillStyle='#1E9E5E';
  ctx.beginPath();
  ctx.arc(0,-h*0.4,w*0.44,Math.PI,0);
  ctx.fill();
  ctx.fillRect(-w*0.1,-h*0.42,w*0.55,w*0.14);
  // глаз
  ctx.fillStyle='#1E4635';
  ctx.beginPath(); ctx.arc(w*0.14,-h*0.33,w*0.07,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function setInput(dir,val){
  if(dir==='left') inputLeft=val;
  if(dir==='right') inputRight=val;
}
const leftBtn=document.getElementById('leftBtn');
const rightBtn=document.getElementById('rightBtn');
const jumpBtn=document.getElementById('jumpBtn');
['touchstart','mousedown'].forEach(ev=>{
  leftBtn.addEventListener(ev,e=>{e.preventDefault();setInput('left',true);});
  rightBtn.addEventListener(ev,e=>{e.preventDefault();setInput('right',true);});
  jumpBtn.addEventListener(ev,e=>{e.preventDefault();inputJumpQueued=true;});
});
['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>{
  leftBtn.addEventListener(ev,()=>setInput('left',false));
  rightBtn.addEventListener(ev,()=>setInput('right',false));
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') inputLeft=true;
  if(e.key==='ArrowRight') inputRight=true;
  if(e.key===' '||e.key==='ArrowUp') inputJumpQueued=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft') inputLeft=false;
  if(e.key==='ArrowRight') inputRight=false;
});
document.getElementById('restart').onclick=reset;
window.addEventListener('load', reset);
if(document.readyState==='complete') reset();
</script>
</body>
</html>
