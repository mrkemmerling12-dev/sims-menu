<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Змейка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E4635;--ink-soft:#4C7767;--pink:#F58FB3;--pink-dark:#C2507A;--card-bg:#FFFFFF;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;padding:0;height:100%;width:100%;font-family:'Nunito',sans-serif;color:var(--ink);
    touch-action:none;overscroll-behavior:none;
    background:linear-gradient(180deg,#BFF3E0 0%,#E9FBEF 55%,#FFF7E0 100%);overflow:hidden;}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;}
  .back-btn{position:fixed;top:12px;left:12px;width:42px;height:42px;border-radius:50%;background:var(--card-bg);
    display:flex;align-items:center;justify-content:center;font-size:19px;text-decoration:none;color:var(--ink);
    box-shadow:0 6px 0 rgba(0,0,0,0.06),0 8px 14px -6px rgba(30,70,53,0.3);z-index:20;}
  .back-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  .hud{position:fixed;top:12px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:center;
    font-weight:700;font-size:13px;color:var(--ink-soft);z-index:20;}
  .score-badge{background:#FDEAF0;color:var(--pink-dark);padding:5px 13px;border-radius:20px;font-family:'Baloo 2',sans-serif;
    font-size:15px;box-shadow:0 4px 10px -4px rgba(30,70,53,0.3);transition:transform 0.2s;}
  .score-badge.bump{transform:scale(1.25);}
  .level-badge{background:#fff;padding:5px 13px;border-radius:20px;box-shadow:0 4px 10px -4px rgba(30,70,53,0.3);}
  .board-holder{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;}
  canvas{border-radius:0;touch-action:none;display:block;}
  .hint{position:fixed;bottom:10px;left:0;right:0;text-align:center;font-weight:700;color:var(--ink-soft);font-size:12px;z-index:20;}
  .overlay{position:fixed;inset:0;background:rgba(30,70,53,0.55);display:none;align-items:center;justify-content:center;z-index:30;}
  .overlay.show{display:flex;}
  .modal{background:var(--card-bg);border-radius:22px;padding:26px 24px;text-align:center;max-width:280px;
    box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);}
  .modal h2{font-family:'Baloo 2',sans-serif;margin:0 0 8px;font-size:22px;color:var(--pink-dark);}
  .modal p{font-weight:700;color:var(--ink-soft);margin:0 0 16px;}
  .btn-main{background:linear-gradient(135deg,var(--pink),#FBC3D6);border:none;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:16px;padding:12px 26px;border-radius:16px;box-shadow:0 8px 0 var(--pink-dark);}
  .btn-main:active{transform:translateY(4px);box-shadow:0 4px 0 var(--pink-dark);}
</style>
</head>
<body>
<a class="back-btn" href="index.html">⬅️</a>
<div class="hud">
  <span class="level-badge" id="levelLabel">Уровень 1</span>
  <span class="score-badge" id="score">0</span>
</div>
<div class="wrap">
  <div class="board-holder"><canvas id="board"></canvas></div>
</div>
<p class="hint">Тапни в сторону, куда ползти, или свайпни</p>
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Игра окончена 🍎</h2>
    <p id="finalScore">Счёт: 0</p>
    <button class="btn-main" id="restart">Сыграть ещё</button>
  </div>
</div>
<script>
if(window.Telegram && window.Telegram.WebApp){
  const tg=window.Telegram.WebApp;
  tg.ready(); tg.expand();
  if(typeof tg.disableVerticalSwipes==='function') tg.disableVerticalSwipes();
}

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const cols=22, rows=22;
let cell=16, W=0, H=0;

function resizeCanvas(){
  const holder=document.querySelector('.board-holder');
  const size=Math.floor(Math.min(holder.clientWidth, holder.clientHeight));
  cell=Math.floor(size/cols);
  const px=cell*cols;
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  canvas.style.width=px+'px'; canvas.style.height=px+'px';
  canvas.width=px*dpr; canvas.height=px*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  W=px; H=px;
}
window.addEventListener('resize', resizeCanvas);

const BASE_SPEED=170, MIN_SPEED=90, SPEED_STEP=10, APPLES_PER_LEVEL=5;
const PALETTES=[
  ['#1E9E5E','#7BE3A6'], ['#1B7FA8','#8FD6F5'], ['#7647B8','#C8A9F0'],
  ['#C2507A','#F5AFC6'], ['#C97A1E','#FFCB80'], ['#B8367D','#F0A0C8']
];
let snake, dir, nextDir, food, score, alive, loopId, level, speed, particles, foodPulse, palette, glowPulse;

function reset(){
  resizeCanvas();
  snake=[{x:11,y:11},{x:10,y:11},{x:9,y:11}];
  dir={x:1,y:0}; nextDir=dir;
  score=0; alive=true; level=1; speed=BASE_SPEED; particles=[]; foodPulse=0; glowPulse=0;
  palette=PALETTES[0];
  document.getElementById('score').textContent=score;
  document.getElementById('levelLabel').textContent='Уровень '+level;
  placeFood();
  document.getElementById('overlay').classList.remove('show');
  if(loopId) clearInterval(loopId);
  loopId=setInterval(tick,speed);
  requestAnimationFrame(render);
}
function updateLevel(){
  const newLevel=Math.floor(score/APPLES_PER_LEVEL)+1;
  if(newLevel!==level){
    level=newLevel;
    speed=Math.max(MIN_SPEED, BASE_SPEED-(level-1)*SPEED_STEP);
    palette=PALETTES[(level-1)%PALETTES.length];
    document.getElementById('levelLabel').textContent='Уровень '+level;
    clearInterval(loopId);
    loopId=setInterval(tick,speed);
  }
}
function placeFood(){
  while(true){
    const p={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};
    if(!snake.some(s=>s.x===p.x&&s.y===p.y)){food=p;return;}
  }
}
function tick(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=cols||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;
    const scoreEl=document.getElementById('score');
    scoreEl.textContent=score;
    scoreEl.classList.add('bump');
    setTimeout(()=>scoreEl.classList.remove('bump'),200);
    for(let i=0;i<14;i++) particles.push({x:food.x*cell+cell/2,y:food.y*cell+cell/2,vx:(Math.random()-0.5)*3.4,vy:(Math.random()-0.5)*3.4,life:22,color:palette[1]});
    placeFood(); updateLevel();
  } else { snake.pop(); }
}
function render(){
  foodPulse+=0.15; glowPulse+=0.08;
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);
  draw();
  requestAnimationFrame(render);
}
function gameOver(){
  alive=false; clearInterval(loopId);
  document.getElementById('finalScore').textContent='Счёт: '+score;
  document.getElementById('overlay').classList.add('show');
}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#F5FFF9'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(53,197,122,0.06)';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if((r+c)%2===0) ctx.fillRect(c*cell,r*cell,cell,cell);
  const pulse=Math.sin(foodPulse)*1.5;
  ctx.fillStyle=palette[0];
  ctx.beginPath();
  ctx.arc(food.x*cell+cell/2, food.y*cell+cell/2, cell/2.4+pulse, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#5A8A3D';
  ctx.fillRect(food.x*cell+cell/2-1, food.y*cell+2, 2, 4);
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/22);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,2.4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  const headGlow=Math.sin(glowPulse)*3+6;
  if(snake.length){
    const h=snake[0];
    ctx.save();
    ctx.globalAlpha=0.25;
    ctx.fillStyle=palette[1];
    ctx.beginPath();
    ctx.arc(h.x*cell+cell/2, h.y*cell+cell/2, cell/2+headGlow, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  snake.forEach((s,i)=>{
    const t=i/Math.max(1,snake.length-1);
    const c1=hexToRgb(palette[0]), c2=hexToRgb(palette[1]);
    const r=Math.round(c1[0]+(c2[0]-c1[0])*t);
    const g=Math.round(c1[1]+(c2[1]-c1[1])*t);
    const b=Math.round(c1[2]+(c2[2]-c1[2])*t);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    const rad = i===0 ? 7 : 5;
    roundRect(s.x*cell+1,s.y*cell+1,cell-2,cell-2,rad);
    ctx.fill();
  });
  if(snake.length){
    const h=snake[0];
    const cx=h.x*cell+cell/2, cy=h.y*cell+cell/2;
    const ox=dir.x*4, oy=dir.y*4;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(cx+ox-dir.y*4,cy+oy+dir.x*4,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ox+dir.y*4,cy+oy-dir.x*4,2.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1E4635';
    ctx.beginPath(); ctx.arc(cx+ox-dir.y*4,cy+oy+dir.x*4,1.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ox+dir.y*4,cy+oy-dir.x*4,1.2,0,Math.PI*2); ctx.fill();
  }
}
function hexToRgb(hex){ const n=parseInt(hex.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function setDir(x,y){ if(dir.x===-x&&dir.y===-y) return; nextDir={x,y}; }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp') setDir(0,-1);
  if(e.key==='ArrowDown') setDir(0,1);
  if(e.key==='ArrowLeft') setDir(-1,0);
  if(e.key==='ArrowRight') setDir(1,0);
});

// Тап или свайп — определяем направление относительно головы змейки
let touchStartX=0, touchStartY=0;
function steerToward(clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  const px=clientX-rect.left, py=clientY-rect.top;
  const head=snake[0];
  const headPxX=head.x*cell+cell/2, headPxY=head.y*cell+cell/2;
  const ddx=px-headPxX, ddy=py-headPxY;
  if(Math.abs(ddx)>Math.abs(ddy)) setDir(ddx>0?1:-1,0); else setDir(0,ddy>0?1:-1);
}
canvas.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  const dist=Math.hypot(dx,dy);
  if(dist>26){
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  } else {
    steerToward(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
},{passive:true});
canvas.addEventListener('click',e=>{ steerToward(e.clientX, e.clientY); });

document.getElementById('restart').onclick=reset;
reset();
</script>
</body>
</html>
